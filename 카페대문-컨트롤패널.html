    head += `      <td style="padding:0 4px 12px;text-align:center;vertical-align:top">`
      + `<span style="display:inline-block;background:${dowBg};color:${dowFg};border-radius:13px;padding:3px 11px;font-size:${SZ.dow}px;font-weight:600">${DOW[d.key]}</span>`
      + `<div style="font-size:${SZ.date}px;font-weight:800;color:${tone};margin-top:7px;letter-spacing:-0.5px">${dates[d.key]||''}</div></td>\n`;
  });

  // 카드 1개. narrow(겹쳐서 좁을 때) = 이름 위 / 제목 / 알약 아래 (원본 스타일)
  //          넓을 때 = 이름 + 알약 한 줄(우상단) / 제목 아랫줄
  const oneCard = (c, narrow) => {
    const m = mcol(c.mem); const href = (c.url || m.url).trim();
    const img = imgs[c.mem];
    const pill = `<span style="display:inline-block;background:${pillBg};color:#2A2724;border-radius:9px;padding:2px 8px;font-size:${SZ.pill}px;font-weight:800;white-space:nowrap">${fmtTime(c.time, t.timeFmt)}</span>`;
    let body;
    if (narrow) {
      body = `<b style="font-size:${SZ.name}px;color:${m.fg}">${m.name}</b>`
        + (c.title ? `<div style="font-size:${SZ.title}px;color:${m.fg};margin-top:5px;text-align:${align};${titleWrap}">${c.title}</div>` : '')
        + `<div style="margin-top:7px;text-align:${align}">${pill}</div>`;
    } else {
      const topRow = `<table cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse"><tr>`
        + `<td style="padding:0;text-align:left;vertical-align:middle"><b style="font-size:${SZ.name}px;color:${m.fg}">${m.name}</b></td>`
        + `<td style="padding:0 0 0 4px;text-align:right;vertical-align:middle;width:1%">${pill}</td></tr></table>`;
      const titleHtml = c.title ? `<div style="font-size:${SZ.title}px;color:${m.fg};margin-top:6px;text-align:${align};${titleWrap}">${c.title}</div>` : '';
      if (img) {
        const ts = SZ.thumb;
        body = `<table cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse"><tr>`
          + `<td style="padding:0;vertical-align:top"><b style="font-size:${SZ.name}px;color:${m.fg}">${m.name}</b>${titleHtml}</td>`
          + `<td style="padding:0 0 0 6px;vertical-align:top;text-align:right;width:${ts}px">`
            + `${pill}<br><img src="${img}" alt="" style="width:${ts}px;height:${ts}px;object-fit:cover;border-radius:9px;display:inline-block;margin-top:6px"></td>`
          + `</tr></table>`;
      } else { body = topRow + titleHtml; }
    }
    // <a> 자체가 카드 = 카드 전체 클릭 (네이버가 안 풀어헤침)
    const cardStyle = `background:${m.bg};border-radius:${t.radius}px;padding:10px 12px;`
      + `box-shadow:0 2px 5px rgba(0,0,0,.12);min-height:${SZ.cardH}px;box-sizing:border-box;`
      + `text-decoration:none;cursor:pointer;word-break:keep-all;`
      + (narrow ? `display:inline-block;width:49%;vertical-align:top` : `display:block`);
    return `<a href="https://${href}" class="schd-card" style="${cardStyle}">${body}</a>`;
  };

  // 시간행 (테두리 없음 = 흰 배경 포스터 느낌, 자연 높이)
  let rows = '';
  TIMES.forEach(tt => {
    rows += `    <tr>\n`;
    DAYS.forEach(d => {
      const es = sched.filter(s => s.day===d.key && s.time===tt)
        .sort((a,b)=>MEMBERS.findIndex(m=>m.id===a.mem)-MEMBERS.findIndex(m=>m.id===b.mem));
      if (!es.length) { rows += `      <td></td>\n`; return; }
      let inner;
      if (es.length > 1 && t.collision === '좌우') {
        inner = es.map((c,i) => `${i?'<span style="display:inline-block;width:2%"></span>':''}${oneCard(c, true)}`).join('');
      } else {
        inner = es.map((c,i) => `<div style="${i?'margin-top:6px':''}">${oneCard(c)}</div>`).join('');
      }
      rows += `      <td style="padding:5px 6px;vertical-align:top">${inner}</td>\n`;
    });
    rows += `    </tr>\n`;
  });

  // 상단 헤더: 엠블럼 + 제목 + 빨간 배지
  let topHeader = '';
  if (t.header || t.subtitle) {
    const emS = SZ.big + 14;
    const emblem = logo
      ? `<img src="${logo}" alt="" style="width:${emS}px;height:${emS}px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:10px">`
      : `<span style="display:inline-block;width:30px;height:30px;border-radius:50%;background:#2A3A8F;color:#fff;text-align:center;line-height:30px;font-weight:800;font-size:15px;vertical-align:middle;margin-right:9px">V</span>`;
    const titleTxt = t.header ? `${emblem}<b style="font-size:${SZ.big}px;color:${headInk};vertical-align:middle">${t.header}</b>` : '';
    const badge = t.subtitle ? `<span style="display:inline-block;background:#FF5A5A;color:#fff;border-radius:18px;padding:6px 14px;font-size:${SZ.dow+1}px;font-weight:700">📢 ${t.subtitle}</span>` : '';
    topHeader = `  <table cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;margin-bottom:10px"><tr>`
      + `<td style="padding:0;text-align:left;vertical-align:middle">${titleTxt}</td>`
      + `<td style="padding:0;text-align:right;vertical-align:middle">${badge}</td></tr></table>\n`
      + `  <div style="border-bottom:2px solid ${headLine};margin-bottom:14px"></div>\n`;
  }
  // 네이버: <style> 비허용(인라인 CSS만). hover는 미리보기에서만(Preview가 따로 입힘).
  const table = `  <table cellpadding="0" cellspacing="0" style="border-collapse:collapse;width:100%;table-layout:fixed">\n    <tbody>\n    <tr>\n${head}    </tr>\n${rows}    </tbody>\n  </table>`;
  return `<div style="font-family:${FONT};background:${bgInfo.bg};color:${headInk};padding:16px 14px;max-width:740px">\n${topHeader}${table}\n</div>`;
}

function pickImage(id, setImg) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = () => {
    const f = inp.files && inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => setImg(id, r.result);
    r.readAsDataURL(f);
  };
  inp.click();
}

// '#abc'/'#aabbcc'/'rgb()' → color input용 6자리 hex (대충 보정)
function toHex(c) {
  if (typeof c !== 'string') return '#000000';
  if (/^#[0-9a-fA-F]{6}$/.test(c)) return c;
  if (/^#[0-9a-fA-F]{3}$/.test(c)) return '#' + c.slice(1).split('').map(x=>x+x).join('');
  return '#888888';
}

function TimeGrid({ sched, dates={}, format='table', mode='preview', selId, onSelect, onAdd,
                   radius=6, timeFmt='AM/PM', dark=false, imgs={}, fill=false, colors={} }) {

    [...new Set(sched.map(s=>s.time))].sort((a,b)=>tmin(a)-tmin(b)), [sched]);
  const at = (day, time) => sched
    .filter(s => s.day===day && s.time===time)
    .sort((a,b)=>MEMBERS.findIndex(m=>m.id===a.mem)-MEMBERS.findIndex(m=>m.id===b.mem));

  const pv   = mode==='preview';
  const rowH = pv ? 52 : 58;
  const gut  = pv ? 46 : 54;
  const fs   = pv ? 9 : 11;
  const line = dark ? 'rgba(255,255,255,0.13)' : HAIR;
  const headBg = dark ? '#2A2723' : '#FBFAF7';
  const gutFg  = dark ? 'rgba(255,255,255,0.7)' : SUBINK;
  const subFg  = dark ? 'rgba(255,255,255,0.5)' : SUBINK;
  const emptyZone = { flex:1, display:'flex', alignItems:'center', justifyContent:'center',
    color: dark?'rgba(255,255,255,0.25)':'#D2CCBF', fontSize:14, border:`1px dashed ${line}`, borderRadius:radius };

  return (
    <div style={{ display:'grid', gridTemplateColumns:`${gut}px repeat(7, 1fr)`,
      gridTemplateRows: fill ? `auto repeat(${TIMES.length}, minmax(0, 1fr))` : 'auto',
      height: fill ? '100%' : 'auto',
      border: fill ? 'none' : `1px solid ${line}`, borderRadius: fill ? 0 : 10, overflow:'hidden',
      background: dark ? '#1C1A18' : '#fff' }}>
      <div style={{ ...hdrCell, background:headBg }}/>
      {DAYS.map(d => {
        const tone = (dark && d.tone===INK) ? '#ECE8E1' : d.tone;
        return (
        <div key={d.key} style={{ ...hdrCell, background:headBg, textAlign:'center', borderLeft:`1px solid ${line}` }}>
          <div style={{ fontSize:pv?11:13, fontWeight:700, color:tone }}>{d.key}</div>
          <div style={{ fontSize:pv?8.5:10, color:subFg }}>{dates[d.key]}</div>
        </div>
        );
      })}
      {TIMES.map(t => (
        <React.Fragment key={t}>
          <div style={{ ...gutCell, background:headBg, color:gutFg, fontSize:pv?9.5:11.5, borderTop:`1px solid ${line}` }}>{fmtTime(t, timeFmt)}</div>
          {DAYS.map(d => {
            const es = at(d.key, t);
            return (
              <div key={d.key} style={{ borderLeft:`1px solid ${line}`, borderTop:`1px solid ${line}`,
                minHeight: fill ? 0 : rowH, minWidth:0, padding:3, display:'flex', flexDirection:'row', gap:3 }}>
                {es.length===0
                  ? (mode==='editor' ? <div style={{ ...emptyZone, cursor:'pointer' }} title="여기에 방송 추가" onClick={()=>onAdd && onAdd(d.key, t)}>＋</div> : null)
                  : es.map(c => {
                      const _m = M[c.mem]; const _o = colors[c.mem]||{};
                      const m = { name:_m.name, bg:_o.bg||_m.bg, fg:_o.fg||_m.fg };
                      const on = c.id===selId; const split = es.length>1;
                      const img = imgs[c.mem];
                      const imgSize = split ? 0 : (pv ? 30 : 38);
                      return (
                        <div key={c.id}
                          onClick={mode==='editor' ? ()=>onSelect(c.id) : undefined}
                          style={{ flex:1, minWidth:0, minHeight:0, background:m.bg, color:m.fg, borderRadius:radius,
                            padding:split?'3px 5px':'3px 6px', display:'flex', flexDirection:'row', alignItems:'center', gap:5,
                            cursor:mode==='editor'?'pointer':'default', position:'relative', overflow:'hidden',
                            outline:on?`2.5px solid ${ACCENT}`:'none', outlineOffset:1,
                            boxShadow:on?'0 4px 12px rgba(0,0,0,0.18)':'none' }}>
                          <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column', justifyContent:'center' }}>
                            <div style={{ fontSize:fs, fontWeight:800, lineHeight:1.1,
                              overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.name}</div>
                            <div style={{ fontSize:fs, lineHeight:1.15, fontWeight:600, marginTop:1,
                              textDecorationLine:(pv&&format==='table')?'underline':'none',
                              textDecorationColor:'rgba(0,0,0,0.25)',
                              overflow:'hidden', textOverflow:'ellipsis', display:'-webkit-box',
                              WebkitLineClamp:2, WebkitBoxOrient:'vertical' }}>{c.title}</div>
                          </div>

/* ───────────────────────── 시트 새로고침 엔진 (gviz JSONP — file:// OK) ───────────────────────── */
const SHEET_ID = '1BsAtW0sfSRjyJOQAe3mgVzYuRLa6rUasWOfPca1kEQw';
const GIDS = [1915098412,101804373,157305670,1732047555,1450063042,765296139,1416966752,1762834858];
const NAME2ID = {'여우연':'yeowooyeon','설홍':'seolhong','나노':'nano','눈요':'nunyo','최애리':'choiaeri','루첼':'ruchel','베이블루':'bayblue'};
const OFFSET = new Set(['','x','X','휴방','-','휴뱅','휴 방']);
const MDAYS = [31,28,31,30,31,30,31,31,30,31,30,31];
const DAYK = ['월','화','수','목','금','토','일'];

function gvizFetch(gid) {
  return new Promise((resolve, reject) => {
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    const s = document.createElement('script');
    let done = false;
    const finish = (fn, arg) => { if (done) return; done = true; try { s.remove(); } catch(e){} fn(arg); };
    window.google.visualization.Query.setResponse = (resp) => finish(resolve, resp);
    s.onerror = () => finish(reject, new Error('load fail gid=' + gid));
    s.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${gid}&tqx=out:json&headers=0`;
    document.head.appendChild(s);
    setTimeout(() => finish(reject, new Error('timeout gid=' + gid)), 15000);
  });
}
function gridFromResp(resp) {
  const rows = (resp.table && resp.table.rows) || [];
  return rows.map(r => (r.c || []).map(c => c == null ? '' : (c.f != null ? String(c.f) : (c.v != null ? String(c.v) : ''))));
}
function normTime(t) {
  const m = String(t).trim().toLowerCase().match(/(\d{1,2})(?::(\d{2}))?\s*([ap])\.?m/);
  if (!m) return String(t).trim();
  const ap = m[3].toUpperCase() + 'M';
  return m[2] ? `${m[1]}:${m[2]}${ap}` : `${m[1]}${ap}`;
}
function datesFromLabel(label) {
  const out = {}; const m = String(label || '').match(/(\d{2})(\d{2})/);
  if (!m) { DAYK.forEach(k => out[k] = ''); return out; }
  let mo = +m[1], da = +m[2];
  for (const k of DAYK) { out[k] = `${String(mo).padStart(2,'0')}.${String(da).padStart(2,'0')}`; da++; if (da > MDAYS[mo-1]) { da = 1; mo = mo % 12 + 1; } }
  return out;
}
function rangeFromLabel(label) {
  return String(label || '').replace(/\s/g,'').replace('~','–').replace(/(\d{2})(\d{2})/g,'$1.$2');
}
function parseWeek(grid, gid) {
  let hi = -1, dstart = -1;
  for (let i = 0; i < grid.length; i++) { const j = grid[i].indexOf('월'); if (j >= 0) { hi = i; dstart = j; break; } }
  if (hi < 0) return null;
  const mcol = dstart - 1;
  let label = '';
  for (let i = 0; i < hi && !label; i++) for (const c of grid[i]) if (c && /\d.*[~\-]/.test(c)) { label = c.trim(); break; }
  const entries = []; let id = 0;
  for (let i = hi + 1; i < grid.length;) {
    const name = (grid[i][mcol] || '').trim();
    if (NAME2ID[name]) {
      const tr = grid[i+1] || [];
      for (let di = 0; di < 7; di++) {
        const ci = dstart + di;
        const t = (grid[i][ci] || '').trim();
        const title = (tr[ci] || '').trim();
        if (OFFSET.has(t) || title === '휴방') continue;
        entries.push({ id:`g${gid}-${id++}`, day:DAYK[di], time:normTime(t), mem:NAME2ID[name], title:title.replace(/\s*\n\s*/g,' ').trim() });
      }
      i += 2;
    } else i++;
  }
  return { label, gid, range:rangeFromLabel(label), dates:datesFromLabel(label), entries };
}
async function fetchAllWeeks() {
  const out = [];
  for (const g of GIDS) {
    try {
      const resp = await gvizFetch(g);
      if (resp && resp.status === 'ok') { const w = parseWeek(gridFromResp(resp), g); if (w && w.entries.length) out.push(w); }
    } catch(e) { /* 한 탭 실패는 건너뛰고 계속 */ }
  }
  out.sort((a,b) => a.label < b.label ? -1 : a.label > b.label ? 1 : 0);
  return out;
}

  const [scale, setScale]     = useState(1);
  useEffect(() => {

    fit(); window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);
  const [weeks, setWeeks]     = useState(WEEKS);          // 내장 스냅샷 = 초기값/폴백
  const [weekIdx, setWeekIdx] = useState(DEFAULT_WEEK);
  // 주차별 데이터를 편집 가능한 복사본으로 보관 (편집해도 원본 안 건드림)
  const [byWeek, setByWeek]   = useState(() => WEEKS.map(w => w.entries.map(e => ({...e}))));
  const [selId, setSelId]     = useState(null);
  const [copied, setCopied]   = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [synced, setSynced]   = useState(false);          // 시트에서 새로 불러왔나
  const [theme, setTheme]     = useState({                // 디자인 탭이 실제로 바꾸는 값
    header:'주간 스케줄표', subtitle:'',
    font:'Pretendard', fontSize:'보통', align:'왼쪽', wrap:'자동',
    collision:'좌우', radius:16, bg:'흰색', timeFmt:'AM/PM',
  });
  const [imgs, setImgs] = useState(() => {                // 멤버별 이미지 (localStorage 영속)
    try { return JSON.parse(localStorage.getItem('cafe_member_img') || '{}'); } catch(e) { return {}; }
  });
  const setImg = (id, dataUrl) => {
    const next = { ...imgs }; if (dataUrl) next[id] = dataUrl; else delete next[id];
    setImgs(next);
    try { localStorage.setItem('cafe_member_img', JSON.stringify(next)); } catch(e) {}
  };
  const [colors, setColors] = useState(() => {            // 멤버별 색 override (배경/글자색)
    try { return JSON.parse(localStorage.getItem('cafe_member_colors') || '{}'); } catch(e) { return {}; }
  });
  const [logo, setLogoState] = useState(() => { try { return localStorage.getItem('cafe_logo') || ''; } catch(e) { return ''; } });
  const setLogo = (dataUrl) => {
    setLogoState(dataUrl || '');
    try { if (dataUrl) localStorage.setItem('cafe_logo', dataUrl); else localStorage.removeItem('cafe_logo'); } catch(e) {}
  };
  const setColor = (id, key, val) => {
    const next = { ...colors, [id]: { ...(colors[id]||{}), [key]: val } };
    setColors(next);
    try { localStorage.setItem('cafe_member_colors', JSON.stringify(next)); } catch(e) {}
  };
  const resetColor = (id) => {
    const next = { ...colors }; delete next[id]; setColors(next);
    try { localStorage.setItem('cafe_member_colors', JSON.stringify(next)); } catch(e) {}
  };
  const [urls, setUrls] = useState(() => {                // 멤버별 기본 URL override
    try { return JSON.parse(localStorage.getItem('cafe_member_urls') || '{}'); } catch(e) { return {}; }
  });
  const setUrl = (id, val) => {
    const next = { ...urls }; if (val) next[id] = val; else delete next[id];
    setUrls(next);
    try { localStorage.setItem('cafe_member_urls', JSON.stringify(next)); } catch(e) {}
  };

  const week  = weeks[weekIdx];
  const sched = byWeek[weekIdx];
  const setSched = (next) => setByWeek(byWeek.map((s,i)=> i===weekIdx ? next : s));

  const goWeek = (d) => {
    const n = Math.min(weeks.length-1, Math.max(0, weekIdx + d));
    setWeekIdx(n); setSelId(null);
  };

  const onRefresh = async () => {
    setSyncing(true);
    try {
      const live = await fetchAllWeeks();
      if (live.length) {
        const curGid = weeks[weekIdx] && weeks[weekIdx].gid;
        const ni = live.findIndex(w => w.gid === curGid);
        setWeeks(live);
        setByWeek(live.map(w => w.entries.map(e => ({...e}))));
        setWeekIdx(ni < 0 ? Math.min(weekIdx, live.length-1) : ni);
        setSelId(null); setSynced(true);
      } else {
        alert('시트를 불러오지 못했어요. 시트 공유가 "링크 있는 사람 보기"인지, 인터넷 연결을 확인해줘요.');
      }
    } catch(e) {
      alert('새로고침 실패: ' + e.message);
    }
    setSyncing(false);
  };

  const onCopy = () => {
    const html = format==='table' ? genTableHTML(sched, week.dates, theme, colors, imgs, logo, urls) : genImagemapHTML(sched);
    try { navigator.clipboard && navigator.clipboard.writeText(html); } catch(e){}
    setCopied(true); setTimeout(()=>setCopied(false), 1600);
  };

  return (
    <div style={{ transform:`scale(${scale})`, transformOrigin:'center center' }}>
      <Win>
        <Toolbar format={format} setFormat={setFormat} onCopy={onCopy} copied={copied}
          week={week} count={sched.length} synced={synced}
          onPrev={()=>goWeek(-1)} onNext={()=>goWeek(1)}
          hasPrev={weekIdx>0} hasNext={weekIdx<weeks.length-1} />
        <div style={{ flex:1, display:'flex', minHeight:0 }}>
          <LeftRail section={section} setSection={setSection}
            onRefresh={onRefresh} syncing={syncing} synced={synced} />
          <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column' }}>
            {section==='members'  && <MembersPanel imgs={imgs} setImg={setImg} colors={colors} setColor={setColor} resetColor={resetColor} urls={urls} setUrl={setUrl} />}
            {section==='schedule' && <ScheduleEditor sched={sched} setSched={setSched} selId={selId} setSelId={setSelId} dates={week.dates} label={week.range} imgs={imgs} colors={colors} />}
            {section==='design'   && <DesignPanel theme={theme} setTheme={setTheme} logo={logo} setLogo={setLogo} />}
            {section==='output'   && <OutputPanel format={format} setFormat={setFormat} />}
          </div>
          <Preview sched={sched} format={format} week={week} theme={theme} colors={colors} imgs={imgs} logo={logo} urls={urls} />
        </div>
      </Win>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
