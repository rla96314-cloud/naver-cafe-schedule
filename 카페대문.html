/* csv.mjs — 작은 CSV 파서/직렬화 (의존성 0, Node·브라우저 공용).
   따옴표로 감싼 필드 안의 쉼표/개행/이스케이프된 따옴표("")를 처리한다. */

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  const s = String(text).replace(/\r\n?/g, '\n');
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (inQuotes) {
      if (ch === '"') {
        if (s[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += ch;
    } else if (ch === '"') {
      inQuotes = true;
    } else if (ch === ',') {
      row.push(field); field = '';
    } else if (ch === '\n') {
      row.push(field); rows.push(row); row = []; field = '';
    } else field += ch;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r[0] && r[0].trim() !== ''));
}

/* 첫 줄을 헤더로 보고 객체 배열로. */
function parseCSVObjects(text) {
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const head = rows[0].map(h => h.trim());
  return rows.slice(1).map(r => {
    const o = {};
    head.forEach((h, i) => { o[h] = (r[i] ?? '').trim(); });
    return o;
  });
}

function toCSV(objects, columns) {
  const esc = v => {
    const s = String(v ?? '');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const lines = [columns.join(',')];
  for (const o of objects) lines.push(columns.map(c => esc(o[c])).join(','));
  return lines.join('\n');
}

   ★ 확정된 생존 규칙(1차 + 2차 실측):
   - <a>에 background / display:block / display:inline-block 를 주면 네이버가 그 요소를
     통째로 삭제한다(1차 ⑦, 2차 A·B·C 전부 사라짐). → "카드 전체 클릭" 불가능.
   - <a>에 color / text-decoration 만 있으면 생존(1차 ①, 2차 D·E). 밑줄도 보존됨(E).
     → 카드는 <div>(배경/모서리/그림자), 클릭 링크는 카드 안 텍스트를 감싼 "수수한" inline <a>.
   - data: base64 이미지는 제거(1차 ⑥). 외부 <img src=https>는 보존(1차 ⑤).

/* "11AM" "9am" "1:30PM" "6.30PM" → 분(정렬용). 못 읽으면 큰 수(맨 끝).
   분 구분자는 : 와 . 둘 다 허용 — 표시는 원문 그대로. */
function timeToMinutes(t) {
  const m = String(t).trim().toLowerCase().match(/(\d{1,2})(?:[:.](\d{2}))?\s*([ap])\.?m\b/);
  if (!m) return 99999;
  let h = (+m[1]) % 12;
  if (m[3] === 'p') h += 12;
  return h * 60 + (+(m[2] || 0));
}
/* 표시용 시간. mode '24시'면 HH:MM, 아니면 원문 그대로. */
function formatTime(t, mode) {
  if (mode !== '24시') return String(t);
  const mm = timeToMinutes(t);
  if (mm >= 99999) return String(t);
  return `${String(Math.floor(mm / 60)).padStart(2, '0')}:${String(mm % 60).padStart(2, '0')}`;
}

/* URL이 실제로 링크 걸 만한가? 빈값·플레이스홀더(…, CHANNEL_ID)면 false → 일반 셀. */
function isUsableUrl(u) {
  const s = String(u || '').trim();
  if (!s) return false;
  if (s.includes('…') || s.includes('...') || /CHANNEL_ID/i.test(s)) return false;
  return true;
}
function href(u) {
  let s = String(u).trim();
  if (!/^https?:\/\//i.test(s)) s = 'https://' + s;
  return escapeAttr(s);
}

/* 이미지 URL 정규화 — 구글 드라이브 "공유 링크"는 뷰어 HTML 페이지라 <img>에 안 뜬다.
   file/d/<ID>/view · open?id= · uc?id= 형태를 직접 이미지 주소(lh3)로 자동 변환.
   (실측: 공유링크=text/html, lh3=image/png) */
function normalizeImgUrl(u) {
  const s = String(u || '').trim();
  if (!s) return '';
  const m = s.match(/drive\.google\.com\/(?:file\/d\/|open\?id=|uc\?[^#]*\bid=)([a-zA-Z0-9_-]{20,})/);
  if (m) return 'https://lh3.googleusercontent.com/d/' + m[1];
  return s;
}

/* ── 네이버 렌더 시뮬레이션 ──
   미리보기/PNG가 "붙여넣은 뒤 실제 모습"과 같아지도록, 네이버가 하는 일을 미리 적용한다:
   ① 새니타이저가 제거하는 스타일 삭제(overflow:hidden, word-break, overflow-wrap — 실측)
   ② 네이버엔 Pretendard 폰트가 없음 → 폰트 스택에서 빼서 시스템 폰트로 렌더되게. */
function simulateNaver(html) {
  return String(html)
    .replace(/overflow:hidden;?/g, '')
    .replace(/word-break:[^;"']+;?/g, '')
    .replace(/overflow-wrap:[^;"']+;?/g, '')
    .replace(/text-overflow:[^;"']+;?/g, '')
    .replace(/'Pretendard',\s*/g, '');
}

/* ── 생성 시점 글자 맞춤 ──
   ★네이버가 overflow:hidden을 제거함(실제 대문 실측 2026-07-06: 제목이 카드 밖으로 흘러나옴).
   → 구역 클립에 의존하지 말고, 폭·줄수를 계산해 생성 단계에서 잘라낸다(줄은 <br>로 확정).
   글자폭 단위(Pretendard 실측): 한글 0.95 / 기호 0.5 / 영문·숫자 0.55 (×F). 0.92 보수 계수. */
function chUnit(ch) {
  if (ch === ' ') return 0.28;                                    // 공백(실측 0.27)
  if (/[♥♡●◆★☆]/.test(ch)) return 0.87;                      // 기호(실측 0.87)
  if (/[ᄀ-ᇿ⺀-꓏가-힣豈-﫿︰-﹏＀-｠]/.test(ch)) return 0.87;  // 한글/전각(실측 0.865)
  if (/[A-Z0-9]/.test(ch)) return 0.68;                           // 대문자·숫자(실측 0.66~0.69)
  return 0.5;                                                     // 소문자·기타
}
function textUnits(s) { let u = 0; for (const ch of String(s)) u += chUnit(ch); return u; }
/* 텍스트를 폭(px)·폰트·최대줄수에 맞춰 줄 배열로. 넘치면 잘라내고 마지막에 … */
function fitLines(text, widthPx, fontPx, maxLines) {
  return fitLinesInfo(text, widthPx, fontPx, maxLines).lines;
}
/* fitLines + 잘렸는지(trunc) 여부 — 자동 크기 탐색용 */
function fitLinesInfo(text, widthPx, fontPx, maxLines) {
  const perLine = Math.max(1, (widthPx / fontPx) * 0.96);
  const words = String(text || '').split(/\s+/).filter(Boolean);
  const lines = [];
  let cur = '', curU = 0, trunc = false;
  const push = () => { if (cur) { lines.push(cur); cur = ''; curU = 0; } };
  outer:
  for (const w of words) {
    const u = textUnits(w);
    const need = cur ? 0.55 + u : u;
    if (curU + need <= perLine) { cur = cur ? cur + ' ' + w : w; curU += need; continue; }
    push();
    if (lines.length >= maxLines) { trunc = true; break; }
    let rest = w;
    while (textUnits(rest) > perLine) { // 한 줄보다 긴 단어는 글자 단위로 쪼갬
      let acc = '', au = 0;
      for (const ch of rest) { if (au + chUnit(ch) > perLine) break; acc += ch; au += chUnit(ch); }
      if (!acc) break;
      lines.push(acc); rest = rest.slice(acc.length);
      if (lines.length >= maxLines) { trunc = true; break outer; }
    }
    cur = rest; curU = textUnits(rest);
  }
  push();
  if (lines.length > maxLines) { lines.length = maxLines; trunc = true; }
  if (trunc && lines.length) { // 마지막 줄에 … 넣을 자리 확보
    let last = lines[lines.length - 1];
    while (last && textUnits(last) + 0.55 > perLine) last = last.slice(0, -1);
    lines[lines.length - 1] = (last || '').replace(/\s+$/, '') + '…';
  }
  return { lines, trunc };
}

/* HTML 이스케이프 — 제목에 <,>,& 들어가도 안 깨지게. */
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g, '&quot;');
}

/* #RGB/#RRGGBB → 상대휘도(0~1). 못 읽으면 0(어두운 것으로 간주). */
function relLuminance(hex) {
  let s = String(hex || '').trim().replace(/^#/, '');
  if (s.length === 3) s = s.split('').map(c => c + c).join('');
  if (!/^[0-9a-fA-F]{6}$/.test(s)) return 0;
  const lin = v => {
    const c = v / 255;
    return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
  };
  return 0.2126 * lin(parseInt(s.slice(0, 2), 16))
       + 0.7152 * lin(parseInt(s.slice(2, 4), 16))
       + 0.0722 * lin(parseInt(s.slice(4, 6), 16));
}

/* ── 본체 ───────────────────────────────────────────────────────────────
   인자:
     members  : [{ id, name, bg, fg, url, img }]
     schedule : [{ day, time, mem, title, url }]   // mem = members[].id
     dates    : { 월:'06.15', ... }
     theme    : 아래 기본값 참고 (survive 포함)
   반환: 네이버 대문에 붙여넣을 HTML 문자열 한 덩어리. */
function generateScheduleHTML({ members = [], schedule = [], dates = {}, theme = {} } = {}) {
  const t = {
    font:'Pretendard', fontSize:'보통', align:'왼쪽', wrap:'자동',
    collision:'좌우', radius:16, bg:'흰색', timeFmt:'AM/PM',
    header:'', subtitle:'', logo:'', linkUnderline:false, fontScale:1,
    cardHeight:60, nameFont:0 /* 0=자동(고정 내용이 다 보이는 최대) */, titleFont:11, oneLineMin:10,
    pillFont:0 /* 0=이름의 0.8배 */, nameWeight:800, pillWeight:800, titleWeight:400,
    nameFamily:'', pillFamily:'', titleFamily:'' /* ''=테마 폰트 따름 */,
    survive: DEFAULT_SURVIVE,
    ...theme,
  };
  const S = { ...DEFAULT_SURVIVE, ...(t.survive || {}) };
  const M = Object.fromEntries(members.map(m => [m.id, m]));
  // 카드 비율(패딩·모서리)은 고정하고 "글씨"만 배율로 조정한다.
  const base = SIZE[t.fontSize] || SIZE.보통;
  const sc = Math.max(0.6, Math.min(1.6, +t.fontScale || 1));
  const SZ = {};
  for (const k in base) SZ[k] = k === 'thumb' ? base[k] : Math.round(base[k] * sc * 10) / 10;
  /* ── 카드 구역 치수 ──
     ┌────────────────────────┐
     │ [③이름]      [④시간]  │ ← 헤더 구역: 높이 = nameFont×1.25, 폰트 고정(축소 없음)
     │ [⑤제목      ]          │ ← 본문 구역: 남는 높이 전부. 제목은 줄바꿈/한줄 선택
     │              [②이미지]│ ← 아바타는 카드 우하단 모서리에 딱 붙음
     └────────────────────────┘
     각 구역은 overflow:hidden — 글자가 구역을 절대 못 넘음. 카드도 안 커짐. */
  // 레퍼런스(1600px)를 740px로 환산한 비율: 카드 ≈ 1.6:1 가로형, 패딩 ≈ 폭의 6%
  const PAD_V = 5, PAD_H = 4, ZONE_GAP = 2;
  /* ③④는 변동성 없는 데이터(멤버 목록·시간 형식) → 이번 주 최장 이름·최장 시간을 미리 알 수 있다.
     nameFont가 0(자동)이면 "고정 내용이 전부 보이는 최대 폰트"를 계산한다.
     열 내용폭: (740 - 바깥패딩24)/7 - 셀패딩8 - 카드패딩18 ≈ 76px */
  const COL_CONTENT = Math.floor((740 - 24) / 7) - 6 - PAD_H * 2;
  const timesSeen = schedule.map(s => String(formatTime(s.time, t.timeFmt)));
  const maxTimeLen = Math.max(3, ...timesSeen.map(s => s.length), 0);
  const namesSeen = members.filter(m => schedule.some(s => s.mem === m.id)).map(m => m.name);
  const maxNameLen = Math.max(2, ...namesSeen.map(n => n.length), 0);
  // 폭 계수(Pretendard 볼드 실측): 한글 ≈ 0.93×F/자, 시간(숫자·영문·콜론) ≈ 0.56×F/자, 알약 좌우패딩 ≈ 0.7×F
  // 레퍼런스 비율: 알약 폰트 = 이름의 0.8배 → 이름이 더 크게 나올 수 있음.
  const PILL_R = 0.8;
  const autoF = Math.floor((COL_CONTENT - ZONE_GAP) / (maxNameLen * 0.93 + PILL_R * (maxTimeLen * 0.56 + 0.72)));
  const nameF = (+t.nameFont > 0) ? +t.nameFont : Math.max(9, Math.min(40, autoF)); // ③ 고정(축소 없음)
  const nameZoneH = Math.round(nameF * 1.25);
  // ④ 시간 크기: 명시(pillFont)면 그것(이름 구역 높이에 캡), 아니면 이름의 0.8배
  const pillF = (+t.pillFont > 0)
    ? Math.max(7, Math.min(+t.pillFont, nameZoneH - 3))
    : Math.max(8, Math.round(nameF * PILL_R));
  const titleF = Math.max(8, Math.round((+t.titleFont || 11) * sc));                  // ⑤ (fontScale 적용)
  const pillW = Math.ceil(pillF * (maxTimeLen * 0.62 + 0.7)) + 2;                     // ④ 구역 = 딱 필요한 폭
  const cardH = (+t.cardHeight > 0) ? +t.cardHeight
    : nameZoneH + Math.round(titleF * 2.6) + PAD_V * 2 + ZONE_GAP;
  const titleZoneH = Math.max(0, cardH - PAD_V * 2 - nameZoneH - ZONE_GAP);
  const fontStack = FONT[t.font] || FONT.Pretendard;
  // 요소별 글꼴 오버라이드('' = 테마 폰트 따름)
  const fam = key => (key && FONT[key]) ? `font-family:${FONT[key]};` : '';
  const bg = BG[t.bg] || BG.흰색;
  const dark = bg.dark;
  const align = t.align === '가운데' ? 'center' : 'left';
  const radius = S.borderRadius ? (+t.radius || 0) : 0;

  const headInk  = dark ? '#ECE8E1' : '#333333';
  const dateInk  = dark ? '#ECE8E1' : '#444444';
  const dowBg    = dark ? 'rgba(255,255,255,0.12)' : '#FFFFFF';
  const dowFg    = dark ? 'rgba(255,255,255,0.7)'  : '#888888';
  const headLine = dark ? '#8A857E' : '#555555';
  const pillBg   = dark ? '#F3F0EA' : '#FFFFFF';
  const cardShadow = S.boxShadow ? 'box-shadow:0 3px 8px rgba(0,0,0,.13);' : '';
  const softShadow = S.boxShadow ? 'box-shadow:0 1px 3px rgba(0,0,0,.06);' : '';
  const badgeShadow = S.boxShadow ? 'box-shadow:0 1px 4px rgba(0,0,0,.08);' : '';

  const TIMES = [...new Set(schedule.map(s => s.time))].sort((a, b) => timeToMinutes(a) - timeToMinutes(b));

  /* 요일 헤더 행 (독립 테이블 — 아래 전폭 구분선을 긋기 위해 분리) */
  let head = '';
  for (const day of DAYS) {
    const tone = DAY_TONE[day] || dateInk;
    head +=
      `      <td style="padding:0 4px;text-align:center;vertical-align:top">` +
      `<span style="display:inline-block;background:${dowBg};color:${dowFg};` +
      (radius ? `border-radius:14px;` : '') +
      `padding:4px 12px;font-size:${SZ.dow}px;font-weight:600;${softShadow}">${DOW[day]}</span>` +
      `<div style="font-size:${SZ.date}px;font-weight:800;color:${tone};margin-top:7px;letter-spacing:-0.5px">` +
      `${escapeHtml(dates[day] || '')}</div></td>\n`;
  }
  const dayHeader =
    `  <table cellpadding="0" cellspacing="0" style="border-collapse:collapse;width:100%;table-layout:fixed">\n` +
    `    <tbody><tr>\n${head}    </tr></tbody>\n  </table>\n` +
    `  <div style="border-bottom:2px solid ${headLine};margin:10px 0 14px"></div>\n`;

  /* 카드 1장.
     스파이크 1차: 카드는 <div>(배경/모서리/그림자 보존). 클릭 링크는 카드 안의
     이름+제목 텍스트를 감싼 inline <a>(블록 <a> 카드는 네이버가 제거하므로). */
  const card = (c, narrow) => {
    const m = M[c.mem];
    if (!m) return '';
    const cardBg = S.bgColor ? m.bg : '#FFFFFF';
    const linkable = S.linkText && isUsableUrl(c.url || m.url);
    const url = c.url || m.url;
    // data: 이미지는 네이버가 제거(⑥) → 외부 http(s) URL만 허용.
    const imgN = normalizeImgUrl(m.img); // 드라이브 공유링크 → 직접 이미지 주소
    const img = (S.inlineImg && imgN && /^https?:\/\//i.test(imgN)) ? imgN : null;

    const timeTxt = escapeHtml(formatTime(c.time, t.timeFmt));
    // ④알약 폭 = 이 카드의 시간 길이 기준(주 최장 기준이면 '9AM' 카드도 '6.30PM' 폭을 낭비 —
    // 제목 폭을 부당하게 조임). 레퍼런스 포스터도 알약이 내용만큼만 넓다.
    const myPillW = Math.ceil(pillF * (textUnits(String(timeTxt)) + 0.5)) + 1;
    const deco = t.linkUnderline ? 'underline' : 'none';
    const link = inner => linkable
      ? `<a href="${href(url)}" class="schd-link" style="text-decoration:${deco};color:${m.fg}">${inner}</a>`
      : inner;

    /* ④ 시간 알약 — 흰 배경, 글자색 = 카드 배경색(밝은 배경이면 fg). 폰트 고정(nameF). */
    const pillFg = S.bgColor ? (relLuminance(m.bg) > 0.7 ? m.fg : m.bg) : '#2A2724';
    const pill =
      `<span style="display:inline-block;background:${pillBg};color:${pillFg};` +
      (radius ? `border-radius:${Math.round(nameZoneH / 2)}px;` : '') +
      `padding:0 ${Math.round(pillF * 0.25)}px;font-size:${pillF}px;line-height:${nameZoneH}px;` +
      `font-weight:${+t.pillWeight || 800};${fam(t.pillFamily)}white-space:nowrap">${timeTxt}</span>`;
    /* ③ 이름 — 폰트 고정(nameF), nowrap, 구역 밖으로 못 나감 */
    const nameHtml = `<b style="font-size:${nameF}px;line-height:${nameZoneH}px;color:${m.fg};font-weight:${+t.nameWeight || 800};${fam(t.nameFamily)}white-space:nowrap">${escapeHtml(m.name)}</b>`;

    /* ⑤ 제목 — ★네이버가 overflow:hidden과 word-break:keep-all을 제거함(대문 실측).
       클립에 기대지 않고 생성 단계에서 fitLines로 줄을 확정(<br>)·잘라냄(…).
       단어는 nowrap span으로 감아(알약으로 생존 증명) 글자 단위 쪼개짐 방지. */
    // 카드별 제목 폰트.
    //  - 수동값(titleSize)이 있으면 그것(구역 높이 상한만 적용)
    //  - 없으면 ★스마트 자동: 테마 크기(titleF)에서 시작해 제목 전문이 …없이
    //    들어가는 가장 큰 크기를 7px까지 내려가며 선택. 다 들어가면 테마 크기 유지(통일감).
    const zoneCap = Math.max(7, Math.floor(titleZoneH / 1.2));
    const wBold = (+t.titleWeight >= 700) ? 0.96 : 1; // 굵은 제목은 실폭 ~4% 넓음 → 보정
    const autoTitleW = narrow
      ? Math.max(20, Math.floor((COL_CONTENT + PAD_H * 2) * 0.49) - PAD_H * 2)
      : ((img && !narrow) ? COL_CONTENT - myPillW - ZONE_GAP : COL_CONTENT);
    let tF, oneLine = false;
    if (+c.titleSize > 0) {
      tF = Math.min(Math.max(7, +c.titleSize), zoneCap);
    } else {
      tF = Math.min(titleF, zoneCap);
      if (c.title && t.wrap !== '말줄임') {
        // ①한 줄 우선: 제목 전체가 한 줄에 들어가는 최대 크기가 oneLineMin 이상이면 채택
        const olMin = Math.max(7, +t.oneLineMin || 10);
        const u = textUnits(String(c.title).trim().replace(/\s+/g, ' '));
        const olMax = Math.floor((autoTitleW * wBold * 0.98) / u);
        if (olMax >= olMin) {
          tF = Math.min(olMax, Math.min(titleF + 1, zoneCap)); // 테마+1까지만(들쭉날쭉 방지)
          oneLine = true;
        } else {
          // ②기존: …없이 들어가는 최대 크기(여러 줄 허용)
          for (let f = Math.min(titleF, zoneCap); f >= 7; f--) {
            const ml = Math.max(1, Math.floor(titleZoneH / Math.round(f * 1.2)));
            if (!fitLinesInfo(c.title, autoTitleW * wBold, f, ml).trunc) { tF = f; break; }
            tF = 7; // 7px로도 안 들어가면 최소 크기에서 … 처리
          }
        }
      }
    }
    const lineH = Math.round(tF * 1.2);
    // ② 아바타 폭 = ④시간 알약 구역 폭(pillW) — 오른쪽이 알약→아바타 한 기둥으로 정렬됨
    const avS = (!narrow && img) ? myPillW : 0;
    const titleW = narrow
      ? Math.max(20, Math.floor((COL_CONTENT + PAD_H * 2) * 0.49) - PAD_H * 2)
      : (avS ? COL_CONTENT - avS - ZONE_GAP : COL_CONTENT);
    const titleMaxLines = h => (t.wrap === '말줄임') ? 1 : Math.max(1, Math.floor(h / lineH));
    const titleHtmlFor = h => {
      if (!c.title) return '';
      if (oneLine) {
        const one = escapeHtml(String(c.title).trim().replace(/\s+/g, ' '));
        return link(`<span class="schd-title" style="font-size:${tF}px;line-height:${lineH}px;color:${m.fg};font-weight:${+t.titleWeight || 400};${fam(t.titleFamily)}white-space:nowrap">${one}</span>`);
      }
      const lines = fitLines(c.title, titleW * wBold, tF, titleMaxLines(h));
      const htmlLines = lines.map(ln =>
        ln.split(' ').map(w => `<span style="white-space:nowrap">${escapeHtml(w)}</span>`).join(' ')
      ).join('<br>');
      return link(`<span class="schd-title" style="font-size:${tF}px;line-height:${lineH}px;color:${m.fg};font-weight:${+t.titleWeight || 400};${fam(t.titleFamily)}">${htmlLines}</span>`);
    };

    /* 구역 div에 font-size·line-height를 박아 넣는다 — 안 하면 inline <a>의 스트럿이
       기본 16px 폰트를 상속해 줄박스가 구역보다 커진다(실측). overflow:hidden은
       미리보기 보험용으로 남기되 동작이 그것에 의존하지 않는다. */
    const nameZone = `height:${nameZoneH}px;overflow:hidden;white-space:nowrap;font-size:${nameF}px;line-height:${nameZoneH}px`;
    const titleZone = h => `height:${h}px;overflow:hidden;text-align:${align};font-size:${tF}px;line-height:${lineH}px`;

    let body;
    if (narrow) {
      /* 충돌(반폭) 카드: 세로 스택 — 이름(위) / 제목 / 시간알약(맨 아래 왼쪽). 아바타 생략. */
      const nTitleH = Math.max(0, cardH - PAD_V * 2 - nameZoneH * 2 - ZONE_GAP * 2);
      body =
        `<div style="${nameZone};text-align:left">${link(nameHtml)}</div>` +
        `<div style="height:${ZONE_GAP}px;line-height:${ZONE_GAP}px;font-size:1px">&nbsp;</div>` +
        `<div style="${titleZone(nTitleH)}">${titleHtmlFor(nTitleH)}</div>` +
        `<div style="height:${ZONE_GAP}px;line-height:${ZONE_GAP}px;font-size:1px">&nbsp;</div>` +
        `<div style="${nameZone};text-align:left">${pill}</div>`;
    } else {
      /* 헤더 구역: 이름 좌 / 시간 우 */
      const headerZone =
        `<table cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;table-layout:fixed"><tr>` +
        `<td style="padding:0;vertical-align:top"><div style="${nameZone};text-align:left">${link(nameHtml)}</div></td>` +
        `<td style="padding:0 0 0 ${ZONE_GAP}px;vertical-align:top;width:${myPillW}px"><div style="${nameZone};text-align:right">${pill}</div></td>` +
        `</tr></table>`;
      /* ② 아바타 — 제목 구역 오른쪽 하단 정렬. 카드 클립에 의존하지 않게 완전히 안쪽에 배치
         (overflow 제거돼도 카드 밖으로 안 나감). */
      /* 드라이브(lh3) 이미지는 서버 크롭(=wW-hH-c)으로 딱 맞는 비율을 받는다 — CSS(object-fit)에
         의존하면 PNG 렌더러·네이버에서 짜부될 수 있음(실측). 그 외 호스트만 object-fit 폴백. */
      const avSrc = /lh3\.googleusercontent\.com/.test(img)
        ? `${img.split('=')[0]}=w${avS * 2}-h${titleZoneH * 2}-c`
        : img;
      const avatar = avS
        ? `<img src="${escapeAttr(avSrc)}" alt="" style="width:${avS}px;height:${titleZoneH}px;object-fit:cover;` +
          (radius ? `border-radius:8px;` : '') +
          `display:block">`
        : '';
      const bodyZone = avatar
        ? `<table cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;table-layout:fixed"><tr>` +
          `<td style="padding:0;vertical-align:top"><div style="${titleZone(titleZoneH)}">${titleHtmlFor(titleZoneH)}</div></td>` +
          `<td style="padding:0 0 0 ${ZONE_GAP}px;vertical-align:top;width:${avS}px">${avatar}</td>` +
          `</tr></table>`
        : `<div style="${titleZone(titleZoneH)}">${titleHtmlFor(titleZoneH)}</div>`;
      body = headerZone + `<div style="height:${ZONE_GAP}px;line-height:${ZONE_GAP}px;font-size:1px">&nbsp;</div>` + bodyZone;
    }

    // 카드: 고정 높이·고정 구역. 내용이 없어도 크기 유지, 많아도 안 커짐(구역에서 클립).
    const style =
      `background:${cardBg};` +
      (radius ? `border-radius:${radius}px;` : '') +
      `padding:${PAD_V}px ${PAD_H}px;${cardShadow}box-sizing:border-box;` +
      `height:${cardH}px;overflow:hidden;` +
      (narrow ? `display:inline-block;width:49%;vertical-align:top;` : `display:block;`);

    // data-eid: 미리보기 클릭 편집용. 복사 시 UI가 제거하고 내보낸다.
    return `<div class="schd-card"${c.id ? ` data-eid="${escapeAttr(c.id)}"` : ''} style="${style}">${body}</div>`;
  };

  /* 시간 행 */
  let rows = '';
  for (const time of TIMES) {
    rows += `    <tr>\n`;
    for (const day of DAYS) {
      const es = schedule
        .filter(s => s.day === day && s.time === time)
        .sort((a, b) => members.findIndex(m => m.id === a.mem) - members.findIndex(m => m.id === b.mem));
      if (!es.length) { rows += `      <td></td>\n`; continue; }
      let inner;
      // 좌우 반폭은 딱 2명일 때만 — 3명 이상은 반폭이 세로로 어색하게 쌓이므로(실측)
      // 전폭 카드를 위아래로 쌓는다.
      if (es.length === 2 && t.collision === '좌우') {
        inner = es.map((c, i) =>
          (i ? '<span style="display:inline-block;width:2%"></span>' : '') + card(c, true)).join('');
      } else {
        inner = es.map((c, i) => `<div style="${i ? 'margin-top:6px' : ''}">${card(c)}</div>`).join('');
      }
      rows += `      <td style="padding:6px 3px;vertical-align:top">${inner}</td>\n`;
    }
    rows += `    </tr>\n`;
  }

  /* 상단 헤더(로고 + 제목 + 날짜범위 + 배지) — 항상 표시. */
  const headerTxt = String(t.header || '').trim() || '주간 스케줄표';
  const range = (dates.월 && dates.일) ? ` (${escapeHtml(dates.월)} – ${escapeHtml(dates.일)})` : '';
  const logoN = normalizeImgUrl(t.logo); // 드라이브 공유링크 → 직접 이미지 주소
  const emblem = (S.inlineImg && logoN && /^https?:\/\//i.test(logoN))
    ? `<img src="${escapeAttr(logoN)}" alt="" style="width:34px;height:34px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:10px">`
    : '';
  const titleTxt =
    `${emblem}<b style="font-size:21px;font-weight:800;color:${headInk};vertical-align:middle;letter-spacing:-0.5px">` +
    `${escapeHtml(headerTxt)}${range}</b>`;
  const badge = t.subtitle
    ? `<span style="display:inline-block;background:#FFFFFF;` +
      (radius ? 'border-radius:18px;' : '') +
      `padding:7px 14px;${badgeShadow}white-space:nowrap">` +
      `<span style="display:inline-block;width:14px;height:14px;` +
      (radius ? 'border-radius:50%;' : '') +
      `background:#EB5757;text-align:center;font-size:9px;line-height:14px;vertical-align:middle">📢</span>` +
      `<span style="font-size:12px;font-weight:600;color:#444444;vertical-align:middle;margin-left:6px">${escapeHtml(t.subtitle)}</span></span>`
    : '';
  const topHeader =
    `  <table cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;margin-bottom:16px"><tr>` +
    `<td style="padding:0;text-align:left;vertical-align:middle">${titleTxt}</td>` +
    `<td style="padding:0;text-align:right;vertical-align:middle">${badge}</td></tr></table>\n`;

  const table =
    `  <table cellpadding="0" cellspacing="0" style="border-collapse:collapse;width:100%;table-layout:fixed">\n` +
    `    <tbody>\n${rows}    </tbody>\n  </table>`;

  return `<div style="font-family:${fontStack};background:${bg.paper};color:${headInk};padding:16px 12px;max-width:740px">\n${topHeader}${dayHeader}${table}\n</div>`;
}

/* ───── src/sheet.js (인라인, 구글시트 연동) ───── */
/* sheet.js — 구글시트 연동 (브라우저 전용, gviz JSONP → file://에서도 동작).

   왜 이렇게 바뀌었나: 옛 버전은 SHEET_ID + GID 8개를 하드코딩 → 시트에 새 주차 탭이
   새 gid로 생기면 안 잡혔다("매주 시트만 고치면" 약속이 깨지는 지점).
   이제는 "그 주 탭의 URL(또는 gid)을 붙여넣기" 한 줄 → 어떤 탭이든(새 탭 포함) 불러온다.
   멤버 이름→id 매핑도 하드코딩 대신 현재 members에서 만든다. */

const DEFAULT_SHEET_ID = '1BsAtW0sfSRjyJOQAe3mgVzYuRLa6rUasWOfPca1kEQw';
/* 알려진 주차 탭(gid). 새 주가 생기면 UI에서 URL 붙여 추가(append)한다. */
const DEFAULT_SHEET_TABS = [
  { gid: '1915098412', label: '03.30–04.05' },
  { gid: '101804373',  label: '04.06–04.12' },
  { gid: '157305670',  label: '05.04–05.10' },
  { gid: '1732047555', label: '06.01–06.07' },
  { gid: '1450063042', label: '06.08–06.14' },
  { gid: '765296139',  label: '06.15–06.21' },
  { gid: '1416966752', label: '06.22–06.28' },
  { gid: '1762834858', label: '06.29–07.05' },
];
const DAYK = ['월', '화', '수', '목', '금', '토', '일'];
const OFFSET = new Set(['', 'x', 'X', '휴방', '-', '휴뱅', '휴 방', '?', '???']);

/* 입력에서 sheetId·gid 추출. 전체 URL / "#gid=123" / 순수 숫자 gid 모두 허용. */
function parseSheetRef(input, defaultId = DEFAULT_SHEET_ID) {
  const s = String(input || '').trim();
  // defaultId 자체가 URL로 들어와도 ID로 정규화 (호출측이 S.sheetId(URL)를 그대로 넘김)
  const dm = String(defaultId).match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  let sheetId = dm ? dm[1] : defaultId, gid = '0';
  const idm = s.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if (idm) sheetId = idm[1];
  else if (/^[a-zA-Z0-9_-]{30,}$/.test(s)) sheetId = s; // 순수 시트 ID(약 44자)
  const gm = s.match(/[#&?]gid=(\d+)/) || s.match(/^(\d+)$/);
  if (gm) gid = gm[1];
  return { sheetId, gid };
}

/* gviz JSONP. ref = {gid} 또는 {name}(탭 이름 — members/config처럼 이름으로 찾을 때). */
function gvizFetch(sheetId, ref) {
  return new Promise((resolve, reject) => {
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    const s = document.createElement('script');
    let done = false;
    const fin = (fn, a) => { if (done) return; done = true; try { s.remove(); } catch {} fn(a); };
    window.google.visualization.Query.setResponse = resp => fin(resolve, resp);
    s.onerror = () => fin(reject, new Error('시트를 불러오지 못함 — 공유가 "링크 있는 사람 보기"인지 확인'));
    const sel = ref.name != null ? `sheet=${encodeURIComponent(ref.name)}` : `gid=${ref.gid}`;
    s.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?${sel}&tqx=out:json&headers=0`;
    document.head.appendChild(s);
    setTimeout(() => fin(reject, new Error('시트 응답 시간 초과')), 15000);
  });
}

function gridFromResp(resp) {
  const rows = (resp.table && resp.table.rows) || [];
  return rows.map(r => (r.c || []).map(c => c == null ? '' : (c.f != null ? String(c.f) : (c.v != null ? String(c.v) : ''))));
}

/* "11AM" "9am" "1:30PM" → "11AM"/"9AM"/"1:30PM" 정규화(생성기 timeToMinutes와 호환). */
function normTime(t) {
  const m = String(t).trim().toLowerCase().match(/(\d{1,2})(?::(\d{2}))?\s*([ap])\.?m/);
  if (!m) return String(t).trim();
  const ap = m[3].toUpperCase() + 'M';
  return m[2] ? `${m[1]}:${m[2]}${ap}` : `${m[1]}${ap}`;
}

/* 시트 그리드 → {entries, weekStart}. 레이아웃: 멤버명 칸(요일 헤더 왼쪽 열) +
   멤버마다 2행(시간 행 / 제목 행), 열 = 월~일. (사용자 시트 구조) */
function parseWeekGrid(grid, members) {
  const name2id = {};
  for (const m of members) name2id[m.name] = m.id;

  let hi = -1, dstart = -1;
  for (let i = 0; i < grid.length; i++) {
    const j = grid[i].indexOf('월');
    if (j >= 0) { hi = i; dstart = j; break; }
  }
  if (hi < 0) return null;
  const mcol = dstart - 1;

  let label = '';
  for (let i = 0; i < hi && !label; i++)
    for (const c of grid[i]) if (c && /\d.*[~\-]/.test(c)) { label = c.trim(); break; }

  const entries = []; let id = 0;
  for (let i = hi + 1; i < grid.length;) {
    const name = (grid[i][mcol] || '').trim();
    if (name2id[name]) {
      // 시간행은 grid[i], 제목행은 보통 grid[i+1]. 단, 시간만 적고 프로그램(제목)을
      // 안 적으면 그 멤버의 제목행이 시트에 아예 없다 → 다음 행이 바로 또 다른 멤버.
      // 이때 아래 멤버의 시간행을 제목으로 잘못 끌어오지 않게 제목을 빈칸 처리하고 1행만 전진.
      const next = grid[i + 1] || [];
      const nextIsMember = !!name2id[(next[mcol] || '').trim()];
      const tr = nextIsMember ? [] : next;
      for (let di = 0; di < 7; di++) {
        const ci = dstart + di;
        const t = (grid[i][ci] || '').trim();
        const title = (tr[ci] || '').trim();
        if (OFFSET.has(t) || title === '휴방') continue;
        entries.push({ id: 's' + id++, day: DAYK[di], time: normTime(t), mem: name2id[name], title: title.replace(/\s*\n\s*/g, ' ').trim(), url: '' });
      }
      i += nextIsMember ? 1 : 2;
    } else i++;
  }
  const m = label.match(/(\d{2})(\d{2})/);
  const weekStart = m ? `${m[1]}.${m[2]}` : '';
  return { entries, weekStart, label };
}

/* 한 탭 불러오기 → {schedule, weekStart, label, gid}. 실패 시 throw. */
async function loadWeekFromSheet(input, members, defaultId = DEFAULT_SHEET_ID) {
  const { sheetId, gid } = parseSheetRef(input, defaultId);
  const resp = await gvizFetch(sheetId, { gid });
  if (!resp || resp.status !== 'ok') throw new Error('시트 응답 오류 (gid가 맞는지 확인)');
  const w = parseWeekGrid(gridFromResp(resp), members);
  if (!w || !w.entries.length) throw new Error('이 탭에서 스케줄을 못 찾았어요 (멤버 이름·요일 행 확인)');
  return { schedule: w.entries, weekStart: w.weekStart, label: w.label || '', gid };
}

/* 여러 탭을 순서대로 불러와 주(week) 배열로. 실패한 탭은 건너뛴다.
   onProgress(done, total)로 진행상황 알림(선택). */
async function loadTabsFromSheet(sheetIdOrUrl, tabs, members, onProgress) {
  const sheetId = parseSheetRef(sheetIdOrUrl).sheetId; // URL이든 순수 ID든 받아서 ID로
  const weeks = [];
  for (let i = 0; i < tabs.length; i++) {
    const tab = tabs[i];
    try {
      const resp = await gvizFetch(sheetId, { gid: tab.gid });
      if (resp && resp.status === 'ok') {
        const w = parseWeekGrid(gridFromResp(resp), members);
        if (w && w.entries.length) {
          weeks.push({
            gid: String(tab.gid),
            label: w.label || tab.label || tab.gid,
            weekStart: w.weekStart || '',
            schedule: w.entries,
          });
        }
      }
    } catch { /* 한 탭 실패는 건너뜀 */ }
    if (onProgress) onProgress(i + 1, tabs.length);
  }
  // weekStart(MM.DD) 기준 정렬
  weeks.sort((a, b) => String(a.weekStart).localeCompare(String(b.weekStart)));
  return weeks;
}

/* ── v2: 설정도 시트에 (members / config 탭) ──────────────────────────────
   운영진 공유의 핵심 — 색·URL·이미지·테마가 시트에 있으면 누가 열어도 같은 결과.
   탭이 아직 없으면 throw → 호출측이 기본값으로 폴백. */

/* members 탭: 헤더 = 멤버 | 배경색 | 글자색 | 채널URL | 이미지URL. id는 이름 그대로. */
async function loadMembersTab(sheetIdOrUrl) {
  const sheetId = parseSheetRef(sheetIdOrUrl).sheetId;
  const resp = await gvizFetch(sheetId, { name: 'members' });
  if (!resp || resp.status !== 'ok') throw new Error('members 탭 없음');
  const grid = gridFromResp(resp);
  const hi = grid.findIndex(r => r.some(c => c.trim() === '멤버'));
  if (hi < 0) throw new Error('members 탭에 "멤버" 헤더가 없음');
  const head = grid[hi].map(c => c.trim());
  const col = k => head.indexOf(k);
  const iName = col('멤버'), iBg = col('배경색'), iFg = col('글자색'), iUrl = col('채널URL'), iImg = col('이미지URL');
  const out = [];
  for (let i = hi + 1; i < grid.length; i++) {
    const name = (grid[i][iName] || '').trim();
    if (!name) continue;
    out.push({
      id: name, name,
      bg: (grid[i][iBg] || '#CCCCCC').trim(),
      fg: (grid[i][iFg] || '#111111').trim(),
      url: iUrl >= 0 ? (grid[i][iUrl] || '').trim() : '',
      img: iImg >= 0 ? (grid[i][iImg] || '').trim() : '',
    });
  }
  if (!out.length) throw new Error('members 탭이 비어있음');
  return out;
}

/* config 탭: [키 | 값] 행. 키: 헤더 / 배지 / 로고. 없어도 됨. */
/* config 탭 키 ↔ 테마 키. num=숫자, bool='표시/없음' → true/false. 시트 값이 곧 전원의 기본값. */
const CONFIG_KEYS = {
  헤더: { k: 'header' }, 배지: { k: 'subtitle' }, 로고: { k: 'logo' },
  카드높이: { k: 'cardHeight', num: 1 }, 모서리: { k: 'radius', num: 1 },
  이름폰트: { k: 'nameFont', num: 1 }, 제목폰트: { k: 'titleFont', num: 1 },
  시간크기: { k: 'pillFont', num: 1 }, 이름굵기: { k: 'nameWeight', num: 1 },
  시간굵기: { k: 'pillWeight', num: 1 }, 제목굵기: { k: 'titleWeight', num: 1 },
  이름글꼴: { k: 'nameFamily' }, 시간글꼴: { k: 'pillFamily' }, 제목글꼴: { k: 'titleFamily' },
  한줄우선: { k: 'oneLineMin', num: 1 },
  링크밑줄: { k: 'linkUnderline', bool: 1 }, 배경: { k: 'bg' },
  시간표기: { k: 'timeFmt' }, 제목줄바꿈: { k: 'wrap' }, 정렬: { k: 'align' },
};
async function loadConfigTab(sheetIdOrUrl) {
  const sheetId = parseSheetRef(sheetIdOrUrl).sheetId;
  const resp = await gvizFetch(sheetId, { name: 'config' });
  if (!resp || resp.status !== 'ok') throw new Error('config 탭 없음');
  const out = {};
  for (const row of gridFromResp(resp)) {
    const spec = CONFIG_KEYS[(row[0] || '').trim()];
    if (!spec) continue;
    const v = (row[1] || '').trim();
    if (v === '') continue;
    if (spec.num) { const n = parseFloat(v); if (!isNaN(n)) out[spec.k] = n; }
    else if (spec.bool) out[spec.k] = (v === '표시' || v === 'true' || v === 'on');
    else out[spec.k] = v;
  }
  return out;
}

/* ── 새 주차 탭 자동 발견 ──────────────────────────────────────────────
   브라우저는 시트의 탭 목록을 직접 못 읽는다(CORS). 대신 이 시트의 탭 이름이
   "MMDD"(그 주 월요일) 규칙임을 이용해 이름으로 프로브한다.
   gviz sheet=<이름>은 없는 이름이면 기본 탭으로 폴백하므로,
   "파싱된 라벨이 프로브한 MMDD로 시작하는지"로 진짜 탭만 걸러낸다(실측 확정). */

const MDAYS2 = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
function nextMonday(mmdd) { // 'MM.DD' → +7일 'MM.DD'
  const m = String(mmdd).match(/(\d{1,2})[.](\d{1,2})/);
  if (!m) return null;
  let mo = +m[1], da = +m[2] + 7;
  if (da > MDAYS2[mo - 1]) { da -= MDAYS2[mo - 1]; mo = mo % 12 + 1; }
  return `${String(mo).padStart(2, '0')}.${String(da).padStart(2, '0')}`;
}

/* 탭 이름으로 한 주 로드 + 라벨 검증. 폴백/불일치면 throw. */
async function loadWeekByName(sheetIdOrUrl, name, members) {
  const sheetId = parseSheetRef(sheetIdOrUrl).sheetId;
  const resp = await gvizFetch(sheetId, { name });
  if (!resp || resp.status !== 'ok') throw new Error('시트 응답 오류');
  const w = parseWeekGrid(gridFromResp(resp), members);
  if (!w || !w.entries.length) throw new Error(`"${name}" 탭에서 스케줄을 못 찾음`);
  const wantMMDD = String(name).replace(/[^0-9]/g, '');
  const gotMMDD = String(w.label || '').replace(/\s/g, '').slice(0, 4);
  if (wantMMDD && gotMMDD !== wantMMDD) throw new Error(`"${name}" 탭 없음(폴백 감지)`);
  return { schedule: w.entries, weekStart: w.weekStart, label: w.label || name, name };
}

/* 마지막으로 아는 주(weekStart 'MM.DD') 다음 월요일부터 probe개 주를 이름으로 탐색.
   찾은 주 배열 반환(빈 주·미래 미작성 탭은 건너뜀). */
async function discoverWeeks(sheetIdOrUrl, members, fromWeekStart, probe = 8) {
  const found = [];
  let cur = nextMonday(fromWeekStart);
  for (let i = 0; i < probe && cur; i++) {
    const name = cur.replace('.', ''); // '07.06' → '0706'
    try { found.push(await loadWeekByName(sheetIdOrUrl, name, members)); } catch {}
    cur = nextMonday(cur);
  }
  return found;
}

/* ── 탭 목록 통째로 읽기 (htmlview) ─────────────────────────────────────
   실측: docs.google.com/htmlview는 웹 origin에는 CORS를 허용(Origin 반사),
   file://(null origin)은 거부. → 웹(GitHub Pages 등)에선 이걸로 전체 탭을 즉시 확보하고,
   file://에선 이름 프로브(discoverWeeks)로 폴백한다. */
async function listAllTabs(sheetIdOrUrl) {
  const sheetId = parseSheetRef(sheetIdOrUrl).sheetId;
  const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/htmlview`, { credentials: 'omit' });
  if (!res.ok) throw new Error('htmlview ' + res.status);
  const html = await res.text();
  const out = [];
  const re = /items\.push\(\{name:\s*"((?:[^"\\]|\\.)*)"[\s\S]*?gid:\s*"(\d+)"/g;
  let m;
  while ((m = re.exec(html))) {
    try { out.push({ name: JSON.parse('"' + m[1] + '"'), gid: m[2] }); } catch {}
  }
  if (!out.length) throw new Error('탭 목록 파싱 실패');
  return out.reverse(); // htmlview는 최신 탭부터 → 오래된 순으로
}

/* ── DOM 헬퍼 ── */
function el(tag, props = {}, kids = []) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'style') n.style.cssText = v;
    else if (k === 'class') n.className = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (k === 'html') n.innerHTML = v;
    else if (v != null && v !== false) n.setAttribute(k, v);
  }
  for (const c of [].concat(kids)) if (c != null && c !== false) n.append(c.nodeType ? c : document.createTextNode(c));
  return n;
}

let S = boot();
function boot() {
  const cached = (() => { try { return JSON.parse(localStorage.getItem(STORE)) || {}; } catch { return {}; } })();
  let weeks = (Array.isArray(cached.weeks) && cached.weeks.length)
    ? cached.weeks.map(w => {
        // 캐시 복구: 이름으로 발견된 주가 name 없이 저장된 옛 버그 — 라벨(0706 ~ 0712)에서 이름 복원
        let name = w.name || null;

        return { ...w, name, dirty: false };
      })
    : DEFAULT_SHEET_TABS.map(t => ({ gid: String(t.gid), label: t.label, weekStart: '', schedule: [], loaded: false, dirty: false }));
  // 같은 라벨 중복 제거(삭제된 탭의 유령 주가 여러 번 쌓인 캐시 정리) — 첫 번째만 유지
  const seenLabel = new Set();
  weeks = weeks.filter(w => {
    const k = String(w.label || '').replace(/\s/g, '');
    if (k && seenLabel.has(k)) return false;
    if (k) seenLabel.add(k);
    return true;
  });
  // 구역제 레이아웃 이전 캐시(nameFont 없음)는 카드 치수를 새 기본값으로 올림
  const cachedTheme = cached.theme || {};
  if (cachedTheme.nameFont == null) { delete cachedTheme.cardHeight; delete cachedTheme.pillPos; }
  // 포스터 룩(pv:1) 이전 캐시: 비주얼 키를 지워 새 기본값(둥근 포스터)을 받게 함
  if ((cachedTheme.pv || 0) < THEME_DEFAULT.pv) {
    for (const k of ['cardHeight', 'radius', 'titleFont', 'linkUnderline']) delete cachedTheme[k];
    // (과거 여기서 cached.members를 지웠던 게 사용자 설정 유실 사고 — 멤버는 절대 안 지움)
    cachedTheme.pv = THEME_DEFAULT.pv;
  }
  return {
    members: (() => { // 캐시 멤버 유지하되, 빈 url/img는 기본값(CSV)에서 보충
      const fb = fallbackMembers();
      if (!cached.members || !cached.members.length) return fb;
      return cached.members.map(m => {

        return f ? { ...m, url: m.url || f.url, img: m.img || f.img } : m;

    })(),

    theme: { ...THEME_DEFAULT, ...cachedTheme },
    weeks,
    weekIdx: Math.min(typeof cached.weekIdx === 'number' ? cached.weekIdx : weeks.length - 1, weeks.length - 1),

    sync: '캐시', // '시트' | '캐시' | '오프라인' | '동기화 중…'
  };
}

/* ── 파생 데이터 ── */
function computeDates(weekStart) {
  const out = {};
  const m = String(weekStart || '').match(/(\d{1,2})[.\-/](\d{1,2})/);
  if (!m) { for (const d of DAYS) out[d] = ''; return out; }
  let mo = +m[1], da = +m[2];
  for (const d of DAYS) {
    out[d] = `${String(mo).padStart(2, '0')}.${String(da).padStart(2, '0')}`;
    da++; if (da > MDAYS[mo - 1]) { da = 1; mo = mo % 12 + 1; }
  }
  return out;
}
function genHTML() {
  const w = curWeek();
  return generateScheduleHTML({ members: S.members, schedule: w.schedule, dates: computeDates(w.weekStart), theme: S.theme });
}
/* 파싱 경고 — 파서는 관대하게, 경고는 크게(기획 §4 결정4). */
function computeWarnings() {
  const w = curWeek(), M = Object.fromEntries(S.members.map(m => [m.id, m])), out = [];
  for (const e of w.schedule) {
    if (timeToMinutes(e.time) >= 99999) out.push(`${e.day} ${M[e.mem] ? M[e.mem].name : e.mem}: 시간 "${e.time}" 해석 실패 — 맨 아래 정렬됨`);
    if (!M[e.mem]) out.push(`${e.day} "${e.mem}": 멤버 목록에 없음 — 카드 미표시`);
  }
  const linkless = w.schedule.filter(e => !isUsableUrl(e.url || (M[e.mem] || {}).url)).length;
  if (linkless) out.push(`${linkless}개 방송에 링크 없음 (멤버 채널URL을 시트 members 탭에 채우면 해결)`);
  return out;
}

/* 주 로드: gid 또는 탭 이름(name) 어느 쪽으로든. 둘 다 없으면(깨진 캐시) 로드하지 않음
   — gid 없이 loadWeekFromSheet를 부르면 gid=0(첫 탭)으로 폴백해 엉뚱한 데이터를 덮어쓴다. */
function fetchWeek(w) {
  if (w.name) return loadWeekByName(S.sheetId, w.name, S.members);
  if (w.gid) return loadWeekFromSheet(w.gid, S.members, S.sheetId);
  return Promise.reject(new Error('참조 없는 주'));
}
/* 새 주차 탭 자동 발견 — 마지막 주 다음 월요일부터 탭 이름(MMDD)으로 프로브. */
async function discoverAndAppend(probe) {
  // 프로브 시작점 = "오늘이 속한 주의 월요일" — 캐시의 최신 주 기준이면
  // 유령 주(삭제된 탭의 미래 라벨)가 남아있을 때 그 뒤만 뒤져 실제 새 주를 놓친다.
  const d = new Date();
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7) - 7); // 지난주 월요일부터(한 주 여유)
  const from = `${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
  const found = await discoverWeeks(S.sheetId, S.members, from, probe + 1);
  let added = false;
  for (const f of found) {
    if (S.weeks.some(w => w.label === f.label || (w.weekStart && w.weekStart === f.weekStart))) continue;
    S.weeks.push({ gid: null, name: f.name, label: f.label, weekStart: f.weekStart, schedule: f.schedule, loaded: true, dirty: false });
    added = true;
  }
  if (added) S.weeks.sort((a, b) => String(a.weekStart).localeCompare(String(b.weekStart)));
  return added;
}
/* 오늘이 속한 주의 인덱스(월요일 weekStart 기준). 없으면 마지막 주. */
function pickThisWeek() {
  const now = new Date();
  const md = (now.getMonth() + 1) * 100 + now.getDate(); // MDD 숫자
  let best = S.weeks.length - 1;
  S.weeks.forEach((w, i) => {
    const m = String(w.weekStart || '').match(/(\d{2})[.](\d{2})/);
    if (m && (+m[1]) * 100 + (+m[2]) <= md) best = i; // 시작일이 오늘 이전인 마지막 주
  });
  return best;
}
/* 시트의 실제 탭 목록으로 주 목록을 동기화(미러링).
   웹 origin: htmlview로 전체 목록을 읽어 새 탭 추가 + 시트에서 지워진 탭 제거.
   file://: CORS로 목록을 못 읽으므로 이름 프로브 폴백(추가만, 제거 없음). */
async function refreshTabs(full) {
  try {
    const tabs = await listAllTabs(S.sheetId);
    const skip = new Set(['members', 'config']);
    const byGid = new Map(S.weeks.filter(w => w.gid).map(w => [String(w.gid), w]));
    const byName = new Map(S.weeks.filter(w => w.name).map(w => [w.name, w]));
    for (const tb of tabs) {
      if (skip.has(String(tb.name).trim().toLowerCase())) continue;
      const hit = byGid.get(String(tb.gid)) || byName.get(tb.name);
      if (hit) { if (!hit.gid) hit.gid = tb.gid; continue; }
      const mm = String(tb.name).match(/^(\d{2})(\d{2})$/); // '0706' → weekStart 추정
      S.weeks.push({ gid: tb.gid, name: null, label: tb.name, weekStart: mm ? `${mm[1]}.${mm[2]}` : '', schedule: [], loaded: false, dirty: false });
    }
    // 시트에 없는 탭은 제거(시트 = 진실). 단 손으로 고친 주는 보존.
    const live = new Set(tabs.map(tb => String(tb.gid)));
    const curLabel = curWeek() && curWeek().label;
    S.weeks = S.weeks.filter(w => w.dirty || !w.gid ? true : live.has(String(w.gid)));
    const ci = S.weeks.findIndex(w => w.label === curLabel);
    S.weekIdx = ci >= 0 ? ci : Math.min(S.weekIdx, S.weeks.length - 1);
    S.weeks.sort((a, b) => String(a.weekStart || '00.00').localeCompare(String(b.weekStart || '00.00')));
    return true;
  } catch {
    try { return await discoverAndAppend(full ? 10 : 3); } catch { return false; }
  }
}
async function syncFromSheet({ full = false } = {}) {
  S.sync = '동기화 중…'; paintSync();
  let ok = false;
  try { S.members = await loadMembersTab(S.sheetId); S.membersSource = 'sheet'; ok = true; }
  catch { /* members 탭 없음 → 기존 값 유지 */ }
  try { Object.assign(S.theme, await loadConfigTab(S.sheetId)); ok = true; } catch {}
  // 1) 탭 목록 동기화 → 2) 오늘 주 선택 → 3) 데이터 로드
  const wasLatest = S.weekIdx >= S.weeks.length - 1;
  if (await refreshTabs(full)) { ok = true; if (wasLatest) { S.weekIdx = pickThisWeek(); S.selId = null; } }
  const targets = full ? S.weeks.map((_, i) => i) : [S.weekIdx];
  for (const i of targets) {
    const w = S.weeks[i];
    if (!w || (w.dirty && !full) || (!full && w.loaded && i !== S.weekIdx)) continue;
    try {
      const r = await fetchWeek(w);
      Object.assign(w, { schedule: r.schedule, weekStart: r.weekStart, label: r.label || w.label, loaded: true, dirty: false });
      ok = true;
    } catch {}
  }
  S.sync = ok ? '시트' : '오프라인';
  save(); render();
}
async function ensureWeekLoaded(i) {
  const w = S.weeks[i];
  if (w.loaded || w.dirty) return;
  try {
    const r = await fetchWeek(w);
    Object.assign(w, { schedule: r.schedule, weekStart: r.weekStart, label: r.label || w.label, loaded: true });
    save();
  } catch {}
}

/* ── PNG 내보내기 — 740px 오프스크린 렌더 → html2canvas 2배 해상도 → 다운로드.
   아바타(lh3 등)는 CORS 허용 이미지만 캔버스에 들어감(useCORS). */
async function exportPNG(btn) {
  const orig = btn.textContent;
  btn.textContent = '만드는 중…'; btn.disabled = true;
  const host = el('div', { style: 'position:fixed;left:-10000px;top:0;width:740px;background:#EFEFEF' });
  host.innerHTML = simulateNaver(fittedHTML()); // 미리보기·PNG = 네이버 실제 모습
  document.body.append(host);

async function appendTab(input) {

/* ── 설정 화면: 멤버(시트 기반) + 테마 프리셋 + 고급 ── */
function toHex(c) {
  if (typeof c !== 'string') return '#000000';
  if (/^#[0-9a-fA-F]{6}$/.test(c)) return c;
  if (/^#[0-9a-fA-F]{3}$/.test(c)) return '#' + c.slice(1).split('').map(x => x + x).join('');
  return '#888888';
}

      el('div', { style: `border:1px solid var(--hair);border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07);width:${Math.round(740 * scale) + 2}px;background:#fff` }, [host]),
      el('div', { id: 'set-pv-edit', style: 'margin-top:10px;padding:10px 12px;background:#fff;border:1px solid var(--hair);border-radius:10px' }),
    ]),
  ]);
}

function seg(value, options, onChange) {
  const wrap = el('div', { style: 'display:inline-flex;background:#ECE8E0;border-radius:9px;padding:3px;gap:3px;flex-wrap:wrap' });
  for (const o of options) {
    const on = o.v === value;
    wrap.append(el('button', {
      style: `border:none;cursor:pointer;padding:6px 14px;border-radius:7px;font-size:12.5px;font-weight:${on ? 700 : 500};` +
        `background:${on ? '#fff' : 'transparent'};color:${on ? C.accent : C.sub};${on ? 'box-shadow:0 1px 3px rgba(0,0,0,.12)' : ''}`,
      onclick: () => onChange(o.v),
    }, o.label));
  }
  return wrap;
}
function slider(value, min, max, step, fmt, onInput) {
  const lbl = el('span', { style: 'font-size:12px;font-weight:700;color:var(--accent);width:52px;text-align:right' }, fmt(value));
  const range = el('input', { type: 'range', min: String(min), max: String(max), step: String(step), value: String(value),
    style: 'flex:1;accent-color:var(--accent);cursor:pointer',
    oninput: e => { lbl.textContent = fmt(+e.target.value); onInput(+e.target.value); } });
  return el('div', { style: 'display:flex;align-items:center;gap:10px;flex:1' }, [range, lbl]);
}
/* members 탭을 시트에 만들 때 붙여넣을 TSV(탭 구분 → 시트가 열로 쪼갬). */
/* config 탭용 [키|값] TSV — "지금 설정을 기본값으로": 시트에 붙이면 운영진 전원의 기본값이 됨. */
function configRows() {
  const t = S.theme;
  return [
    ['헤더', t.header || ''], ['배지', t.subtitle || ''], ['로고', t.logo || ''],
    ['카드높이', t.cardHeight], ['모서리', t.radius],
    ['이름폰트', t.nameFont || 0], ['제목폰트', t.titleFont],
    ['시간크기', t.pillFont || 0], ['이름굵기', t.nameWeight], ['시간굵기', t.pillWeight], ['제목굵기', t.titleWeight],
    ['이름글꼴', t.nameFamily || ''], ['시간글꼴', t.pillFamily || ''], ['제목글꼴', t.titleFamily || ''], ['한줄우선', t.oneLineMin],
    ['링크밑줄', t.linkUnderline ? '표시' : '없음'], ['배경', t.bg],
    ['시간표기', t.timeFmt], ['제목줄바꿈', t.wrap], ['정렬', t.align],
  ];
}
function configTSV() { return configRows().map(r => r.join('\t')).join('\n'); }

/* 웹앱(Apps Script)으로 config 탭 직접 저장. no-cors 전송 후 gviz로 반영 확인. */
function membersRows() {
  const rows = [['멤버', '배경색', '글자색', '채널URL', '이미지URL']];
  for (const m of S.members) rows.push([m.name, m.bg, m.fg, m.url || '', m.img || '']);
  return rows;
}
async function saveConfigToSheet(btn, withMembers) {
  const url = (S.configWebhook || '').trim();
  if (!/^https:\/\/script\.google\.com\/macros\//.test(url)) {
    alert('먼저 "저장 웹앱 URL"을 넣어줘요.\n(시트 확장→Apps Script에 apps-script-config-writer.gs 배포 후 나온 주소)');
    return;
  }
  const payload = { config: configRows() };
  if (withMembers) payload.members = membersRows();
  const orig = btn.textContent; btn.disabled = true; btn.textContent = '저장 중…';
  try {
    // Apps Script 웹앱은 CORS 프리플라이트를 못 받음 → text/plain + no-cors로 전송(응답은 못 읽음)
    await fetch(url, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
    // 확인: 잠시 후 gviz로 config 탭을 다시 읽어 카드높이가 일치하면 성공
    await new Promise(r => setTimeout(r, 1600));
    let okConfirmed = false;
    try { const c = await loadConfigTab(S.sheetId); okConfirmed = String(c.cardHeight) === String(S.theme.cardHeight); } catch {}
    if (okConfirmed && withMembers) S.membersSource = 'sheet'; // 시트가 원본이 됨
    btn.textContent = okConfirmed ? '시트에 저장됨 ✓' : '전송함(확인 대기)';
    btn.style.background = '#2E7D5B';
    save();
  } catch (e) {
    alert('저장 실패: ' + e.message + '\n웹앱 배포의 "액세스: 모든 사용자"인지 확인해줘요.');
    btn.textContent = orig;
  } finally {
    btn.disabled = false;
    setTimeout(() => { btn.textContent = orig; btn.style.background = C.accent; }, 2200);
  }
}
function membersTSV() { return membersRows().map(r => r.join('\t')).join('\n'); }
let _setTab = 'typo'; // 설정창 활성 탭 (세션 유지)

  function refreshTag() { S.membersSource = 'local'; save(); repaintSettingsPreview(); }
  const setChange = () => { save(); repaintSettingsPreview(); };       // 즉시 미리보기(비구조 변경)
  const setChangeR = () => { save(); render(); };                       // 구조 변경(탭 유지)

  if (_setTab === 'typo') {
    wrap.append(section('요소별 글꼴 · 크기 · 굵기', [
      row('이름', elemTypo('nameFamily', 'nameFont', 'nameWeight', 0, 40, '자동(최대)', setChange, setChangeR)),
      row('시간', elemTypo('pillFamily', 'pillFont', 'pillWeight', 0, 20, '자동(0.8×)', setChange, setChangeR)),
      row('제목', elemTypo('titleFamily', 'titleFont', 'titleWeight', 7, 30, '', setChange, setChangeR)),
      row('기본 폰트', seg(S.theme.font, ['Pretendard', '나눔고딕', '검은고딕'].map(v => ({ v, label: v })), v => { S.theme.font = v; setChangeR(); })),
    ]));
    wrap.append(section('제목 처리', [
      row('한줄 우선', seg(S.theme.oneLineMin, [{ v: 99, label: '끔' }, { v: 9, label: '9px↑' }, { v: 10, label: '10px↑' }, { v: 11, label: '11px↑' }], v => { S.theme.oneLineMin = v; setChangeR(); })),
      row('제목 줄바꿈', seg(S.theme.wrap, [{ v: '자동', label: '줄바꿈' }, { v: '말줄임', label: '한 줄(…)' }], v => { S.theme.wrap = v; setChangeR(); })),
    ]));
  } else if (_setTab === 'card') {
    const presetBtns = Object.entries(PRESETS).map(([name, p]) =>
      el('button', { style: btn, onclick: () => { Object.assign(S.theme, p); setChangeR(); } }, name));
    wrap.append(section('프리셋', [el('div', { style: 'display:flex;gap:8px;flex-wrap:wrap' }, presetBtns)]));
    wrap.append(section('카드 모양', [
      row('카드 높이', slider(S.theme.cardHeight, 40, 200, 4, v => v + 'px', v => { S.theme.cardHeight = v; setChange(); })),
      row('모서리', seg(S.theme.radius, [{ v: 0, label: '직각' }, { v: 8, label: '약간' }, { v: 16, label: '둥글게' }], v => { S.theme.radius = v; setChangeR(); })),
      row('배경', seg(S.theme.bg, ['흰색', '종이', '어둡게'].map(v => ({ v, label: v })), v => { S.theme.bg = v; setChangeR(); })),
      row('링크 밑줄', seg(S.theme.linkUnderline, [{ v: true, label: '표시' }, { v: false, label: '없음' }], v => { S.theme.linkUnderline = v; setChangeR(); })),
      row('시간 표기', seg(S.theme.timeFmt, ['AM/PM', '24시'].map(v => ({ v, label: v })), v => { S.theme.timeFmt = v; setChangeR(); })),
    ]));
    wrap.append(section('헤더', [
      row('제목', el('input', { value: S.theme.header, style: inp + ';flex:1', oninput: e => { S.theme.header = e.target.value; setChange(); } })),
      row('배지', el('input', { value: S.theme.subtitle, style: inp + ';flex:1', placeholder: '비우면 없음', oninput: e => { S.theme.subtitle = e.target.value; setChange(); } })),
      row('로고 URL', el('input', { value: S.theme.logo || '', class: 'mono', style: inp + ';flex:1;font-size:12px', placeholder: 'https://… (외부만)', oninput: e => { S.theme.logo = e.target.value.trim(); setChange(); } })),
    ]));
  } else if (_setTab === 'members') {
    const copyTsvBtn = el('button', { style: btn, onclick: () => {
      navigator.clipboard && navigator.clipboard.writeText(membersTSV());
      copyTsvBtn.textContent = '복사됨 ✓'; setTimeout(() => copyTsvBtn.textContent = 'members 탭용 표 복사', 1500);
    } }, 'members 탭용 표 복사');
    wrap.append(section(`멤버 — ${srcLabel}`, [
      ...memRows,
      el('div', { style: 'display:flex;gap:8px;align-items:center;margin-top:4px' }, [

        el('span', { style: 'font-size:11.5px;color:var(--sub)' }, '→ 시트 "members" 탭 A1에 붙여넣으면 운영진 전원 적용.'),
      ]),
    ]));
    wrap.append(el('div', { style: 'font-size:11.5px;color:var(--sub);line-height:1.6' },
      '참고: 이미지·로고는 외부 https 주소만(업로드/data:는 네이버가 지움). 드라이브 공유링크는 자동 변환.'));
  } else if (_setTab === 'sheet') {

      el('div', { style: 'display:flex;gap:8px;align-items:center' }, [
        el('input', { value: S.sheetId, class: 'mono', style: inp + ';flex:1;font-size:12px', oninput: e => { S.sheetId = e.target.value; save(); } }),

      ]),
    ]));

    wrap.append(section('주 탭 수동 추가', [

    ]));
  }

  // ── 우측: 실시간 카드 미리보기 ──

  return outer;

  function section(title, kids) {

}

/* ── 루트 ── */
function render() {

  save();
}

render();
syncFromSheet(); // 열자마자 시트에서 members/config/현재 주 자동 로드 (무상태)
