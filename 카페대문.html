<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카페 대문 스케줄 생성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--accent:#C0432A;--paper:#F6F4EF;--hair:#E2DED5;--ink:#1C1B19;--sub:#7A756B}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:#E7E3DB;color:var(--ink);
       -webkit-font-smoothing:antialiased}
  button,input,select,textarea{font-family:inherit}
  .mono{font-family:ui-monospace,Menlo,monospace}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.16);border-radius:6px}
  a{color:inherit}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ───── src/csv.mjs (인라인) ───── */
/* csv.mjs — 작은 CSV 파서/직렬화 (의존성 0, Node·브라우저 공용).
   따옴표로 감싼 필드 안의 쉼표/개행/이스케이프된 따옴표("")를 처리한다. */

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  const s = String(text).replace(/\r\n?/g, '\n');
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (inQuotes) {
      if (ch === '"') {
        if (s[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += ch;
    } else if (ch === '"') {
      inQuotes = true;
    } else if (ch === ',') {
      row.push(field); field = '';
    } else if (ch === '\n') {
      row.push(field); rows.push(row); row = []; field = '';
    } else field += ch;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r[0] && r[0].trim() !== ''));
}

/* 첫 줄을 헤더로 보고 객체 배열로. */
function parseCSVObjects(text) {
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const head = rows[0].map(h => h.trim());
  return rows.slice(1).map(r => {
    const o = {};
    head.forEach((h, i) => { o[h] = (r[i] ?? '').trim(); });
    return o;
  });
}

function toCSV(objects, columns) {
  const esc = v => {
    const s = String(v ?? '');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const lines = [columns.join(',')];
  for (const o of objects) lines.push(columns.map(c => esc(o[c])).join(','));
  return lines.join('\n');
}

/* ───── src/generate.mjs (인라인, 코어와 동일) ───── */
/* ─────────────────────────────────────────────────────────────────────────
   generate.mjs — 네이버 카페 대문용 주간 스케줄 HTML 생성기 (순수 함수)

   원칙
   - 의존성 0. import 0. 모듈 전역 데이터 0. → Node에서도 브라우저에서도 그대로 import.
   - 입력은 데이터, 출력은 문자열. DOM·React·localStorage·fetch 일절 안 씀.
   - "네이버에서 살아남는 마크업만" 쓴다. 무엇이 살아남는지는 spike.html 실측으로 확정.
     → 그 결과를 SURVIVE 플래그로 표현. 죽는 스타일은 false 한 줄로 끈다.

   핵심 규칙(설계문서):
   - 칸 = <a href> 로 감싼 셀. URL이 없거나 플레이스홀더(…/CHANNEL_ID)면 <a> 없이 일반 셀.
   - 같은 시간대 2명 충돌 시 좌·우(narrow) 또는 위·아래 배치.
   ───────────────────────────────────────────────────────────────────────── */

/* "네이버 생존 여부" 플래그 — spike.html 1차 실측(2026-06-17)으로 확정.
   - true  = 네이버 스마트에디터가 보존함(붙여넣기 후 새로고침에서 확인).
   - false = 제거됨 → 생성기가 아예 안 내보냄(미리보기=결과 보장).

   ★ 확정된 생존 규칙(1차 + 2차 실측):
   - <a>에 background / display:block / display:inline-block 를 주면 네이버가 그 요소를
     통째로 삭제한다(1차 ⑦, 2차 A·B·C 전부 사라짐). → "카드 전체 클릭" 불가능.
   - <a>에 color / text-decoration 만 있으면 생존(1차 ①, 2차 D·E). 밑줄도 보존됨(E).
     → 카드는 <div>(배경/모서리/그림자), 클릭 링크는 카드 안 텍스트를 감싼 "수수한" inline <a>.
   - data: base64 이미지는 제거(1차 ⑥). 외부 <img src=https>는 보존(1차 ⑤).
     → 멤버 이미지는 외부 URL만. data:는 코드가 거부. */
const DEFAULT_SURVIVE = {
  linkText:     true,   // color/text-decoration만 가진 inline <a> (①·D·E)
  bgColor:      true,   // 셀/카드 배경색 (②)
  borderRadius: true,   // 둥근 모서리 (③)
  boxShadow:    true,   // 그림자 — div 카드에서 보존 (④)
  inlineImg:    true,   // 외부 URL <img>만. data:는 거부 (⑤ / ⑥ FAIL)
  // 카드 전체 클릭(<a>에 bg·display): 불가능으로 확정(⑦·A·B·C 전부 삭제됨).
};

const DAYS = ['월', '화', '수', '목', '금', '토', '일'];
const DOW = { 월:'월요일', 화:'화요일', 수:'수요일', 목:'목요일', 금:'금요일', 토:'토요일', 일:'일요일' };
const DAY_TONE = { 토:'#2F73D8', 일:'#D8392F' }; // 주말 색, 평일은 잉크색

const SIZE = {
  작게: { name:12,   title:10.5, pill:9.5,  dow:10.5, date:17, big:16,   thumb:34 },
  보통: { name:14,   title:12,   pill:11,   dow:11.5, date:21, big:18.5, thumb:42 },
  크게: { name:16,   title:13.5, pill:12.5, dow:12.5, date:25, big:21,   thumb:50 },
};
const FONT = {
  Pretendard: "'Pretendard', -apple-system, sans-serif",
  나눔고딕:   "'Nanum Gothic', sans-serif",
  검은고딕:   "'Black Han Sans', 'Pretendard', sans-serif",
};
const BG = {
  흰색:   { paper:'#FFFFFF', dark:false },
  종이:   { paper:'#F6F4EF', dark:false },
  어둡게: { paper:'#1C1A18', dark:true  },
};

/* "11AM" "9am" "1:30PM" → 분(정렬용). 못 읽으면 큰 수(맨 끝). */
function timeToMinutes(t) {
  const m = String(t).trim().toLowerCase().match(/(\d{1,2})(?::(\d{2}))?\s*([ap])\.?m\b/);
  if (!m) return 99999;
  let h = (+m[1]) % 12;
  if (m[3] === 'p') h += 12;
  return h * 60 + (+(m[2] || 0));
}
/* 표시용 시간. mode '24시'면 HH:MM, 아니면 원문 그대로. */
function formatTime(t, mode) {
  if (mode !== '24시') return String(t);
  const mm = timeToMinutes(t);
  if (mm >= 99999) return String(t);
  return `${String(Math.floor(mm / 60)).padStart(2, '0')}:${String(mm % 60).padStart(2, '0')}`;
}

/* URL이 실제로 링크 걸 만한가? 빈값·플레이스홀더(…, CHANNEL_ID)면 false → 일반 셀. */
function isUsableUrl(u) {
  const s = String(u || '').trim();
  if (!s) return false;
  if (s.includes('…') || s.includes('...') || /CHANNEL_ID/i.test(s)) return false;
  return true;
}
function href(u) {
  let s = String(u).trim();
  if (!/^https?:\/\//i.test(s)) s = 'https://' + s;
  return escapeAttr(s);
}

/* HTML 이스케이프 — 제목에 <,>,& 들어가도 안 깨지게. (현재 생성기엔 없던 구멍) */
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g, '&quot;');
}

/* ── 본체 ───────────────────────────────────────────────────────────────
   인자:
     members  : [{ id, name, bg, fg, url }]
     schedule : [{ day, time, mem, title, url }]   // mem = members[].id
     dates    : { 월:'06.15', ... }
     theme    : 아래 기본값 참고 (survive 포함)
   반환: 네이버 대문에 붙여넣을 HTML 문자열 한 덩어리. */
function generateScheduleHTML({ members = [], schedule = [], dates = {}, theme = {} } = {}) {
  const t = {
    font:'Pretendard', fontSize:'보통', align:'왼쪽', wrap:'자동',
    collision:'좌우', radius:0, bg:'흰색', timeFmt:'AM/PM',
    header:'', subtitle:'', logo:'', linkUnderline:true, fontScale:1,
    cardHeight:100, nameFont:28, titleFont:18,
    survive: DEFAULT_SURVIVE,
    ...theme,
  };
  const S = { ...DEFAULT_SURVIVE, ...(t.survive || {}) };
  const M = Object.fromEntries(members.map(m => [m.id, m]));
  // 카드 비율(패딩·모서리)은 고정하고 "글씨"만 배율로 조정한다.
  // fontScale은 텍스트 크기에만 곱하고 썸네일·패딩은 건드리지 않는다 → 카드 비율 유지.
  const base = SIZE[t.fontSize] || SIZE.보통;
  const sc = Math.max(0.6, Math.min(1.6, +t.fontScale || 1));
  const SZ = {};
  for (const k in base) SZ[k] = k === 'thumb' ? base[k] : Math.round(base[k] * sc * 10) / 10;
  /* ── 카드 구역 치수 (사용자 스케치 기준) ──
     ┌────────────────────────┐
     │ [③이름]      [④시간]  │ ← 헤더 구역: 높이 = nameFont×1.25, 폰트 고정(축소 없음)
     │ [⑤제목      ] [②이미지]│ ← 본문 구역: 남는 높이 전부. 제목은 줄바꿈/한줄 선택
     └────────────────────────┘
     각 구역은 overflow:hidden — 글자가 구역을 절대 못 넘음. 카드도 안 커짐. */
  const nameF = Math.max(8, +t.nameFont || 28);          // ③④ 폰트 (고정, fontScale 무시)
  const titleF = Math.max(8, Math.round((+t.titleFont || 18) * sc)); // ⑤ 폰트 (fontScale 적용)
  const CARD_PAD = 8, ZONE_GAP = 4;
  const nameZoneH = Math.round(nameF * 1.25);
  const cardH = (+t.cardHeight > 0) ? +t.cardHeight
    : nameZoneH + Math.round(titleF * 2.6) + CARD_PAD * 2 + ZONE_GAP;
  const titleZoneH = Math.max(0, cardH - CARD_PAD * 2 - nameZoneH - ZONE_GAP);
  const fontStack = FONT[t.font] || FONT.Pretendard;
  const bg = BG[t.bg] || BG.흰색;
  const dark = bg.dark;
  const align = t.align === '가운데' ? 'center' : 'left';
  const radius = S.borderRadius ? (+t.radius || 0) : 0;

  const headInk  = dark ? '#ECE8E1' : '#2A2724';
  const dowBg    = dark ? 'rgba(255,255,255,0.12)' : '#ECEAE6';
  const dowFg    = dark ? 'rgba(255,255,255,0.7)'  : '#7C766C';
  const headLine = dark ? '#5A554E' : '#D9D4CB';
  const pillBg   = dark ? '#F3F0EA' : '#FFFFFF';
  const shadow   = S.boxShadow ? 'box-shadow:0 2px 5px rgba(0,0,0,.12);' : '';

  const titleWrap = t.wrap === '말줄임'
    ? 'white-space:nowrap;overflow:hidden;text-overflow:ellipsis'
    : 'overflow-wrap:break-word;word-break:keep-all;line-height:1.3';

  const TIMES = [...new Set(schedule.map(s => s.time))].sort((a, b) => timeToMinutes(a) - timeToMinutes(b));

  /* 요일 헤더 */
  let head = '';
  for (const day of DAYS) {
    const tone = DAY_TONE[day] || headInk;
    head +=
      `      <td style="padding:0 4px 12px;text-align:center;vertical-align:top">` +
      `<span style="display:inline-block;background:${dowBg};color:${dowFg};` +
      (radius ? `border-radius:13px;` : '') +
      `padding:3px 11px;font-size:${SZ.dow}px;font-weight:600">${DOW[day]}</span>` +
      `<div style="font-size:${SZ.date}px;font-weight:800;color:${tone};margin-top:7px;letter-spacing:-0.5px">` +
      `${escapeHtml(dates[day] || '')}</div></td>\n`;
  }

  /* 카드 1장.
     스파이크 1차: 카드는 <div>(배경/모서리/그림자 보존). 클릭 링크는 카드 안의
     이름+제목 텍스트를 감싼 inline <a>(블록 <a> 카드는 네이버가 제거하므로). */
  const card = (c, narrow) => {
    const m = M[c.mem];
    if (!m) return '';
    const cardBg = S.bgColor ? m.bg : '#FFFFFF';
    const linkable = S.linkText && isUsableUrl(c.url || m.url);
    const url = c.url || m.url;
    // data: 이미지는 네이버가 제거(⑥) → 외부 http(s) URL만 허용.
    const img = (S.inlineImg && m.img && /^https?:\/\//i.test(m.img)) ? m.img : null;

    const timeTxt = escapeHtml(formatTime(c.time, t.timeFmt));
    const deco = t.linkUnderline ? 'underline' : 'none';
    const link = inner => linkable
      ? `<a href="${href(url)}" class="schd-link" style="text-decoration:${deco};color:${m.fg}">${inner}</a>`
      : inner;

    /* ④ 시간 알약 — 폰트 고정(nameF), 구역 안에서 클립 */
    const pill =
      `<span style="display:inline-block;background:${pillBg};color:#2A2724;` +
      (radius ? `border-radius:${Math.round(nameZoneH / 2)}px;` : '') +
      `padding:0 ${Math.round(nameF * 0.35)}px;font-size:${nameF}px;line-height:${nameZoneH}px;` +
      `font-weight:800;white-space:nowrap">${timeTxt}</span>`;
    /* ③ 이름 — 폰트 고정(nameF), nowrap, 구역 밖으로 못 나감 */
    const nameHtml = `<b style="font-size:${nameF}px;line-height:${nameZoneH}px;color:${m.fg};white-space:nowrap">${escapeHtml(m.name)}</b>`;
    /* 헤더 구역: 이름 좌 / 시간 우. table-layout:fixed + overflow:hidden = 구역 침범 불가 */
    const headerZone =
      `<table cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;table-layout:fixed"><tr>` +
      `<td style="padding:0;vertical-align:top"><div style="height:${nameZoneH}px;overflow:hidden;text-align:left;white-space:nowrap">${link(nameHtml)}</div></td>` +
      `<td style="padding:0 0 0 ${ZONE_GAP}px;vertical-align:top;width:45%"><div style="height:${nameZoneH}px;overflow:hidden;text-align:right;white-space:nowrap">${pill}</div></td>` +
      `</tr></table>`;

    /* ⑤ 제목 구역 — 줄바꿈 선택: '자동'=여러 줄(구역 안에서), '말줄임'=한 줄(…) */
    const wrapCss = t.wrap === '말줄임'
      ? 'white-space:nowrap;text-overflow:ellipsis'
      : 'overflow-wrap:break-word;word-break:keep-all';
    const titleInner = c.title
      ? link(`<span style="font-size:${titleF}px;line-height:1.25;color:${m.fg}">${escapeHtml(c.title)}</span>`)
      : '';
    /* ② 아바타 구역 — 제목 구역 오른쪽 정사각(titleZoneH). 이미지 없으면 제목이 전체 폭 */
    const avatar = img
      ? `<img src="${escapeAttr(img)}" alt="" style="width:${titleZoneH}px;height:${titleZoneH}px;object-fit:cover;${radius ? `border-radius:${Math.min(8, radius)}px;` : ''}display:block">`
      : '';
    const bodyZone = avatar
      ? `<table cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;table-layout:fixed"><tr>` +
        `<td style="padding:0;vertical-align:top"><div style="height:${titleZoneH}px;overflow:hidden;text-align:${align};${wrapCss}">${titleInner}</div></td>` +
        `<td style="padding:0 0 0 ${ZONE_GAP}px;vertical-align:top;width:${titleZoneH + ZONE_GAP}px">${avatar}</td>` +
        `</tr></table>`
      : `<div style="height:${titleZoneH}px;overflow:hidden;text-align:${align};${wrapCss}">${titleInner}</div>`;

    const body = headerZone + `<div style="height:${ZONE_GAP}px;line-height:${ZONE_GAP}px;font-size:1px">&nbsp;</div>` + bodyZone;

    // 카드: 고정 높이·고정 구역. 내용이 없어도 크기 유지, 많아도 안 커짐(구역에서 클립).
    const style =
      `background:${cardBg};` +
      (radius ? `border-radius:${radius}px;` : '') +
      `padding:${CARD_PAD}px;${shadow}box-sizing:border-box;` +
      `height:${cardH}px;overflow:hidden;` +
      (narrow ? `display:inline-block;width:49%;vertical-align:top;` : `display:block;`);

    // data-eid: 미리보기 클릭 편집용. 복사 시 UI가 제거하고 내보낸다.
    return `<div class="schd-card"${c.id ? ` data-eid="${escapeAttr(c.id)}"` : ''} style="${style}">${body}</div>`;
  };

  /* 시간 행 */
  let rows = '';
  for (const time of TIMES) {
    rows += `    <tr>\n`;
    for (const day of DAYS) {
      const es = schedule
        .filter(s => s.day === day && s.time === time)
        .sort((a, b) => members.findIndex(m => m.id === a.mem) - members.findIndex(m => m.id === b.mem));
      if (!es.length) { rows += `      <td></td>\n`; continue; }
      let inner;
      if (es.length > 1 && t.collision === '좌우') {
        inner = es.map((c, i) =>
          (i ? '<span style="display:inline-block;width:2%"></span>' : '') + card(c, true)).join('');
      } else {
        inner = es.map((c, i) => `<div style="${i ? 'margin-top:6px' : ''}">${card(c)}</div>`).join('');
      }
      rows += `      <td style="padding:5px 4px;vertical-align:top">${inner}</td>\n`;
    }
    rows += `    </tr>\n`;
  }

  /* 상단 헤더(제목 + 배지) */
  let topHeader = '';
  if (t.header || t.subtitle) {
    const emS = SZ.big + 14;
    const emblem = (S.inlineImg && t.logo && /^https?:\/\//i.test(t.logo))
      ? `<img src="${escapeAttr(t.logo)}" alt="" style="width:${emS}px;height:${emS}px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:10px">`
      : '';
    const titleTxt = t.header
      ? `${emblem}<b style="font-size:${SZ.big}px;color:${headInk};vertical-align:middle">${escapeHtml(t.header)}</b>`
      : '';
    const badge = t.subtitle
      ? `<span style="display:inline-block;background:#FF5A5A;color:#fff;${radius ? 'border-radius:18px;' : ''}padding:6px 14px;font-size:${SZ.dow + 1}px;font-weight:700">📢 ${escapeHtml(t.subtitle)}</span>`
      : '';
    topHeader =
      `  <table cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;margin-bottom:10px"><tr>` +
      `<td style="padding:0;text-align:left;vertical-align:middle">${titleTxt}</td>` +
      `<td style="padding:0;text-align:right;vertical-align:middle">${badge}</td></tr></table>\n` +
      `  <div style="border-bottom:2px solid ${headLine};margin-bottom:14px"></div>\n`;
  }

  const table =
    `  <table cellpadding="0" cellspacing="0" style="border-collapse:collapse;width:100%;table-layout:fixed">\n` +
    `    <tbody>\n    <tr>\n${head}    </tr>\n${rows}    </tbody>\n  </table>`;

  return `<div style="font-family:${fontStack};background:${bg.paper};color:${headInk};padding:16px 14px;max-width:740px">\n${topHeader}${table}\n</div>`;
}

/* ───── src/sheet.js (인라인, 구글시트 연동) ───── */
/* sheet.js — 구글시트 연동 (브라우저 전용, gviz JSONP → file://에서도 동작).

   왜 이렇게 바뀌었나: 옛 버전은 SHEET_ID + GID 8개를 하드코딩 → 시트에 새 주차 탭이
   새 gid로 생기면 안 잡혔다("매주 시트만 고치면" 약속이 깨지는 지점).
   이제는 "그 주 탭의 URL(또는 gid)을 붙여넣기" 한 줄 → 어떤 탭이든(새 탭 포함) 불러온다.
   멤버 이름→id 매핑도 하드코딩 대신 현재 members에서 만든다. */

const DEFAULT_SHEET_ID = '1BsAtW0sfSRjyJOQAe3mgVzYuRLa6rUasWOfPca1kEQw';
/* 알려진 주차 탭(gid). 새 주가 생기면 UI에서 URL 붙여 추가(append)한다. */
const DEFAULT_SHEET_TABS = [
  { gid: '1915098412', label: '03.30–04.05' },
  { gid: '101804373',  label: '04.06–04.12' },
  { gid: '157305670',  label: '05.04–05.10' },
  { gid: '1732047555', label: '06.01–06.07' },
  { gid: '1450063042', label: '06.08–06.14' },
  { gid: '765296139',  label: '06.15–06.21' },
  { gid: '1416966752', label: '06.22–06.28' },
  { gid: '1762834858', label: '06.29–07.05' },
];
const DAYK = ['월', '화', '수', '목', '금', '토', '일'];
const OFFSET = new Set(['', 'x', 'X', '휴방', '-', '휴뱅', '휴 방', '?', '???']);

/* 입력에서 sheetId·gid 추출. 전체 URL / "#gid=123" / 순수 숫자 gid 모두 허용. */
function parseSheetRef(input, defaultId = DEFAULT_SHEET_ID) {
  const s = String(input || '').trim();
  // defaultId 자체가 URL로 들어와도 ID로 정규화 (호출측이 S.sheetId(URL)를 그대로 넘김)
  const dm = String(defaultId).match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  let sheetId = dm ? dm[1] : defaultId, gid = '0';
  const idm = s.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if (idm) sheetId = idm[1];
  else if (/^[a-zA-Z0-9_-]{30,}$/.test(s)) sheetId = s; // 순수 시트 ID(약 44자)
  const gm = s.match(/[#&?]gid=(\d+)/) || s.match(/^(\d+)$/);
  if (gm) gid = gm[1];
  return { sheetId, gid };
}

/* gviz JSONP. ref = {gid} 또는 {name}(탭 이름 — members/config처럼 이름으로 찾을 때). */
function gvizFetch(sheetId, ref) {
  return new Promise((resolve, reject) => {
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    const s = document.createElement('script');
    let done = false;
    const fin = (fn, a) => { if (done) return; done = true; try { s.remove(); } catch {} fn(a); };
    window.google.visualization.Query.setResponse = resp => fin(resolve, resp);
    s.onerror = () => fin(reject, new Error('시트를 불러오지 못함 — 공유가 "링크 있는 사람 보기"인지 확인'));
    const sel = ref.name != null ? `sheet=${encodeURIComponent(ref.name)}` : `gid=${ref.gid}`;
    s.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?${sel}&tqx=out:json&headers=0`;
    document.head.appendChild(s);
    setTimeout(() => fin(reject, new Error('시트 응답 시간 초과')), 15000);
  });
}

function gridFromResp(resp) {
  const rows = (resp.table && resp.table.rows) || [];
  return rows.map(r => (r.c || []).map(c => c == null ? '' : (c.f != null ? String(c.f) : (c.v != null ? String(c.v) : ''))));
}

/* "11AM" "9am" "1:30PM" → "11AM"/"9AM"/"1:30PM" 정규화(생성기 timeToMinutes와 호환). */
function normTime(t) {
  const m = String(t).trim().toLowerCase().match(/(\d{1,2})(?::(\d{2}))?\s*([ap])\.?m/);
  if (!m) return String(t).trim();
  const ap = m[3].toUpperCase() + 'M';
  return m[2] ? `${m[1]}:${m[2]}${ap}` : `${m[1]}${ap}`;
}

/* 시트 그리드 → {entries, weekStart}. 레이아웃: 멤버명 칸(요일 헤더 왼쪽 열) +
   멤버마다 2행(시간 행 / 제목 행), 열 = 월~일. (사용자 시트 구조) */
function parseWeekGrid(grid, members) {
  const name2id = {};
  for (const m of members) name2id[m.name] = m.id;

  let hi = -1, dstart = -1;
  for (let i = 0; i < grid.length; i++) {
    const j = grid[i].indexOf('월');
    if (j >= 0) { hi = i; dstart = j; break; }
  }
  if (hi < 0) return null;
  const mcol = dstart - 1;

  let label = '';
  for (let i = 0; i < hi && !label; i++)
    for (const c of grid[i]) if (c && /\d.*[~\-]/.test(c)) { label = c.trim(); break; }

  const entries = []; let id = 0;
  for (let i = hi + 1; i < grid.length;) {
    const name = (grid[i][mcol] || '').trim();
    if (name2id[name]) {
      // 시간행은 grid[i], 제목행은 보통 grid[i+1]. 단, 시간만 적고 프로그램(제목)을
      // 안 적으면 그 멤버의 제목행이 시트에 아예 없다 → 다음 행이 바로 또 다른 멤버.
      // 이때 아래 멤버의 시간행을 제목으로 잘못 끌어오지 않게 제목을 빈칸 처리하고 1행만 전진.
      const next = grid[i + 1] || [];
      const nextIsMember = !!name2id[(next[mcol] || '').trim()];
      const tr = nextIsMember ? [] : next;
      for (let di = 0; di < 7; di++) {
        const ci = dstart + di;
        const t = (grid[i][ci] || '').trim();
        const title = (tr[ci] || '').trim();
        if (OFFSET.has(t) || title === '휴방') continue;
        entries.push({ id: 's' + id++, day: DAYK[di], time: normTime(t), mem: name2id[name], title: title.replace(/\s*\n\s*/g, ' ').trim(), url: '' });
      }
      i += nextIsMember ? 1 : 2;
    } else i++;
  }
  const m = label.match(/(\d{2})(\d{2})/);
  const weekStart = m ? `${m[1]}.${m[2]}` : '';
  return { entries, weekStart, label };
}

/* 한 탭 불러오기 → {schedule, weekStart, label, gid}. 실패 시 throw. */
async function loadWeekFromSheet(input, members, defaultId = DEFAULT_SHEET_ID) {
  const { sheetId, gid } = parseSheetRef(input, defaultId);
  const resp = await gvizFetch(sheetId, { gid });
  if (!resp || resp.status !== 'ok') throw new Error('시트 응답 오류 (gid가 맞는지 확인)');
  const w = parseWeekGrid(gridFromResp(resp), members);
  if (!w || !w.entries.length) throw new Error('이 탭에서 스케줄을 못 찾았어요 (멤버 이름·요일 행 확인)');
  return { schedule: w.entries, weekStart: w.weekStart, label: w.label || '', gid };
}

/* 여러 탭을 순서대로 불러와 주(week) 배열로. 실패한 탭은 건너뛴다.
   onProgress(done, total)로 진행상황 알림(선택). */
async function loadTabsFromSheet(sheetIdOrUrl, tabs, members, onProgress) {
  const sheetId = parseSheetRef(sheetIdOrUrl).sheetId; // URL이든 순수 ID든 받아서 ID로
  const weeks = [];
  for (let i = 0; i < tabs.length; i++) {
    const tab = tabs[i];
    try {
      const resp = await gvizFetch(sheetId, { gid: tab.gid });
      if (resp && resp.status === 'ok') {
        const w = parseWeekGrid(gridFromResp(resp), members);
        if (w && w.entries.length) {
          weeks.push({
            gid: String(tab.gid),
            label: w.label || tab.label || tab.gid,
            weekStart: w.weekStart || '',
            schedule: w.entries,
          });
        }
      }
    } catch { /* 한 탭 실패는 건너뜀 */ }
    if (onProgress) onProgress(i + 1, tabs.length);
  }
  // weekStart(MM.DD) 기준 정렬
  weeks.sort((a, b) => String(a.weekStart).localeCompare(String(b.weekStart)));
  return weeks;
}

/* ── v2: 설정도 시트에 (members / config 탭) ──────────────────────────────
   운영진 공유의 핵심 — 색·URL·이미지·테마가 시트에 있으면 누가 열어도 같은 결과.
   탭이 아직 없으면 throw → 호출측이 기본값으로 폴백. */

/* members 탭: 헤더 = 멤버 | 배경색 | 글자색 | 채널URL | 이미지URL. id는 이름 그대로. */
async function loadMembersTab(sheetIdOrUrl) {
  const sheetId = parseSheetRef(sheetIdOrUrl).sheetId;
  const resp = await gvizFetch(sheetId, { name: 'members' });
  if (!resp || resp.status !== 'ok') throw new Error('members 탭 없음');
  const grid = gridFromResp(resp);
  const hi = grid.findIndex(r => r.some(c => c.trim() === '멤버'));
  if (hi < 0) throw new Error('members 탭에 "멤버" 헤더가 없음');
  const head = grid[hi].map(c => c.trim());
  const col = k => head.indexOf(k);
  const iName = col('멤버'), iBg = col('배경색'), iFg = col('글자색'), iUrl = col('채널URL'), iImg = col('이미지URL');
  const out = [];
  for (let i = hi + 1; i < grid.length; i++) {
    const name = (grid[i][iName] || '').trim();
    if (!name) continue;
    out.push({
      id: name, name,
      bg: (grid[i][iBg] || '#CCCCCC').trim(),
      fg: (grid[i][iFg] || '#111111').trim(),
      url: iUrl >= 0 ? (grid[i][iUrl] || '').trim() : '',
      img: iImg >= 0 ? (grid[i][iImg] || '').trim() : '',
    });
  }
  if (!out.length) throw new Error('members 탭이 비어있음');
  return out;
}

/* config 탭: [키 | 값] 행. 키: 헤더 / 배지 / 로고. 없어도 됨. */
const CONFIG_KEYS = { 헤더: 'header', 배지: 'subtitle', 로고: 'logo' };
async function loadConfigTab(sheetIdOrUrl) {
  const sheetId = parseSheetRef(sheetIdOrUrl).sheetId;
  const resp = await gvizFetch(sheetId, { name: 'config' });
  if (!resp || resp.status !== 'ok') throw new Error('config 탭 없음');
  const out = {};
  for (const row of gridFromResp(resp)) {
    const k = CONFIG_KEYS[(row[0] || '').trim()];
    if (k) out[k] = (row[1] || '').trim();
  }
  return out;
}

/* ── DOM 헬퍼 ── */
function el(tag, props = {}, kids = []) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'style') n.style.cssText = v;
    else if (k === 'class') n.className = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (k === 'html') n.innerHTML = v;
    else if (v != null && v !== false) n.setAttribute(k, v);
  }
  for (const c of [].concat(kids)) if (c != null && c !== false) n.append(c.nodeType ? c : document.createTextNode(c));
  return n;
}
const $ = sel => document.querySelector(sel);

/* ── 파생 데이터 ── */
function computeDates(weekStart) {
  const out = {};
  const m = String(weekStart || '').match(/(\d{1,2})[.\-/](\d{1,2})/);
  if (!m) { for (const d of DAYS) out[d] = ''; return out; }
  let mo = +m[1], da = +m[2];
  for (const d of DAYS) {
    out[d] = `${String(mo).padStart(2, '0')}.${String(da).padStart(2, '0')}`;
    da++; if (da > MDAYS[mo - 1]) { da = 1; mo = mo % 12 + 1; }
  }
  return out;
}
function genHTML() {
  const w = curWeek();
  return generateScheduleHTML({ members: S.members, schedule: w.schedule, dates: computeDates(w.weekStart), theme: S.theme });

/* 파싱 경고 — 파서는 관대하게, 경고는 크게(기획 §4 결정4). */
function computeWarnings() {
  const w = curWeek(), M = Object.fromEntries(S.members.map(m => [m.id, m])), out = [];
  for (const e of w.schedule) {
    if (timeToMinutes(e.time) >= 99999) out.push(`${e.day} ${M[e.mem] ? M[e.mem].name : e.mem}: 시간 "${e.time}" 해석 실패 — 맨 아래 정렬됨`);
    if (!M[e.mem]) out.push(`${e.day} "${e.mem}": 멤버 목록에 없음 — 카드 미표시`);
  }
  const linkless = w.schedule.filter(e => !isUsableUrl(e.url || (M[e.mem] || {}).url)).length;
  if (linkless) out.push(`${linkless}개 방송에 링크 없음 (멤버 채널URL을 시트 members 탭에 채우면 해결)`);
  return out;
}

/* ── 시트 동기화 (무상태의 심장) ── */
async function syncFromSheet({ full = false } = {}) {
  S.sync = '동기화 중…'; paintSync();
  let ok = false;
  try { S.members = await loadMembersTab(S.sheetId); S.membersSource = 'sheet'; ok = true; }
  catch { /* members 탭 없음 → 기존 값 유지 */ }
  try { Object.assign(S.theme, await loadConfigTab(S.sheetId)); ok = true; } catch {}
  const targets = full ? S.weeks.map((_, i) => i) : [S.weekIdx];
  for (const i of targets) {
    const w = S.weeks[i];
    if (w.dirty && !full) continue; // 손으로 고친 주는 자동으로 덮지 않음
    try {
      const r = await loadWeekFromSheet(w.gid, S.members, S.sheetId);
      Object.assign(w, { schedule: r.schedule, weekStart: r.weekStart, label: r.label || w.label, loaded: true, dirty: false });
      ok = true;
    } catch {}
  }
  S.sync = ok ? '시트' : '오프라인';
  save(); render();
}
async function ensureWeekLoaded(i) {
  const w = S.weeks[i];
  if (w.loaded || w.dirty) return;
  try {
    const r = await loadWeekFromSheet(w.gid, S.members, S.sheetId);
    Object.assign(w, { schedule: r.schedule, weekStart: r.weekStart, label: r.label || w.label, loaded: true });
    save();
  } catch {}
}

  function section(title, kids) {
    return el('div', { style: 'margin-bottom:16px' }, [
      el('div', { style: 'font-size:13.5px;font-weight:700;margin-bottom:8px' }, title),
      el('div', { style: 'display:flex;flex-direction:column;gap:8px' }, kids),
    ]);
  }
  function row(label, ctrl) {
    return el('div', { style: 'display:flex;align-items:center;gap:12px;padding:9px 12px;background:#fff;border:1px solid var(--hair);border-radius:10px' }, [
      el('div', { style: 'width:76px;font-size:12.5px;font-weight:700;flex-shrink:0' }, label), ctrl,
    ]);
  }
}

/* ── 루트 ── */
function render() {
  const app = $('#app');
  app.innerHTML = '';
  const onMain = S.section === 'main';
  const copyBtn = el('button', { style: btnPrimary, onclick: onCopy }, 'HTML 복사'); copyBtn.id = 'copyBtn';
  const head = el('div', { style: 'height:56px;flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:1px solid var(--hair);background:#fff' }, [
    el('div', { style: 'font-size:15px;font-weight:800' }, '주간 스케줄 대문 만들기'),
    el('span', { id: 'sync-dot', style: 'display:inline-flex;align-items:center;gap:5px' }),
    el('div', { style: 'flex:1' }),
    el('button', { style: btn + (onMain ? '' : `;color:${C.accent};border-color:rgba(192,67,42,.4)`), onclick: () => { S.section = onMain ? 'settings' : 'main'; S.selId = null; render(); } }, onMain ? '설정 ⚙' : '← 돌아가기'),
    copyBtn,
  ]);
  const win = el('div', { style: 'height:100vh;display:flex;flex-direction:column;background:var(--paper);max-width:960px;margin:0 auto;border-left:1px solid var(--hair);border-right:1px solid var(--hair)' }, [
    head,
    onMain ? mainView() : settingsView(),
  ]);
  app.append(win);
  const pv = $('#pv-render');
  if (pv && S.selId) { const c = pv.querySelector(`[data-eid="${S.selId}"]`); if (c) c.style.outline = `2.5px solid ${C.accent}`; }
  paintSync();
  save();
}

render();
syncFromSheet(); // 열자마자 시트에서 members/config/현재 주 자동 로드 (무상태)

</script>
</body>
</html>
