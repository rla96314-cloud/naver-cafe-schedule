<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카페 대문 스케줄 생성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--accent:#C0432A;--paper:#F6F4EF;--hair:#E2DED5;--ink:#1C1B19;--sub:#7A756B}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:#E7E3DB;color:var(--ink);
       -webkit-font-smoothing:antialiased}
  button,input,select,textarea{font-family:inherit}

<body>
<div id="app"></div>
<script>
/* ───── src/csv.mjs (인라인) ───── */
/* csv.mjs — 작은 CSV 파서/직렬화 (의존성 0, Node·브라우저 공용).
   따옴표로 감싼 필드 안의 쉼표/개행/이스케이프된 따옴표("")를 처리한다. */

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  const s = String(text).replace(/\r\n?/g, '\n');
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (inQuotes) {
      if (ch === '"') {
        if (s[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += ch;
    } else if (ch === '"') {
      inQuotes = true;
    } else if (ch === ',') {
      row.push(field); field = '';
    } else if (ch === '\n') {
      row.push(field); rows.push(row); row = []; field = '';
    } else field += ch;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1 || (r[0] && r[0].trim() !== ''));
}

/* 첫 줄을 헤더로 보고 객체 배열로. */
function parseCSVObjects(text) {
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const head = rows[0].map(h => h.trim());
  return rows.slice(1).map(r => {
    const o = {};
    head.forEach((h, i) => { o[h] = (r[i] ?? '').trim(); });
    return o;
  });
}

function toCSV(objects, columns) {
  const esc = v => {
    const s = String(v ?? '');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const lines = [columns.join(',')];
  for (const o of objects) lines.push(columns.map(c => esc(o[c])).join(','));
  return lines.join('\n');
}

/* ───── src/generate.mjs (인라인, 코어와 동일) ───── */
/* ─────────────────────────────────────────────────────────────────────────
   generate.mjs — 네이버 카페 대문용 주간 스케줄 HTML 생성기 (순수 함수)

   원칙
   - 의존성 0. import 0. 모듈 전역 데이터 0. → Node에서도 브라우저에서도 그대로 import.
   - 입력은 데이터, 출력은 문자열. DOM·React·localStorage·fetch 일절 안 씀.
   - "네이버에서 살아남는 마크업만" 쓴다. 무엇이 살아남는지는 spike.html 실측으로 확정.
     → 그 결과를 SURVIVE 플래그로 표현. 죽는 스타일은 false 한 줄로 끈다.

   핵심 규칙(설계문서):
   - 칸 = <a href> 로 감싼 셀. URL이 없거나 플레이스홀더(…/CHANNEL_ID)면 <a> 없이 일반 셀.
   - 같은 시간대 2명 충돌 시 좌·우(narrow) 또는 위·아래 배치.
   ───────────────────────────────────────────────────────────────────────── */

/* "네이버 생존 여부" 플래그 — spike.html 1차 실측(2026-06-17)으로 확정.
   - true  = 네이버 스마트에디터가 보존함(붙여넣기 후 새로고침에서 확인).
   - false = 제거됨 → 생성기가 아예 안 내보냄(미리보기=결과 보장).

   ★ 확정된 생존 규칙(1차 + 2차 실측):
   - <a>에 background / display:block / display:inline-block 를 주면 네이버가 그 요소를
     통째로 삭제한다(1차 ⑦, 2차 A·B·C 전부 사라짐). → "카드 전체 클릭" 불가능.
   - <a>에 color / text-decoration 만 있으면 생존(1차 ①, 2차 D·E). 밑줄도 보존됨(E).
     → 카드는 <div>(배경/모서리/그림자), 클릭 링크는 카드 안 텍스트를 감싼 "수수한" inline <a>.
   - data: base64 이미지는 제거(1차 ⑥). 외부 <img src=https>는 보존(1차 ⑤).
     → 멤버 이미지는 외부 URL만. data:는 코드가 거부. */
const DEFAULT_SURVIVE = {
  linkText:     true,   // color/text-decoration만 가진 inline <a> (①·D·E)
  bgColor:      true,   // 셀/카드 배경색 (②)
  borderRadius: true,   // 둥근 모서리 (③)
  boxShadow:    true,   // 그림자 — div 카드에서 보존 (④)
  inlineImg:    true,   // 외부 URL <img>만. data:는 거부 (⑤ / ⑥ FAIL)
  // 카드 전체 클릭(<a>에 bg·display): 불가능으로 확정(⑦·A·B·C 전부 삭제됨).
};

const DAYS = ['월', '화', '수', '목', '금', '토', '일'];
const DOW = { 월:'월요일', 화:'화요일', 수:'수요일', 목:'목요일', 금:'금요일', 토:'토요일', 일:'일요일' };
const DAY_TONE = { 토:'#2F73D8', 일:'#D8392F' }; // 주말 색, 평일은 잉크색

const SIZE = {
  작게: { name:12,   title:10.5, pill:9.5,  dow:10.5, date:17, big:16,   thumb:34 },
  보통: { name:14,   title:12,   pill:11,   dow:11.5, date:21, big:18.5, thumb:42 },
  크게: { name:16,   title:13.5, pill:12.5, dow:12.5, date:25, big:21,   thumb:50 },
};
const FONT = {
  Pretendard: "'Pretendard', -apple-system, sans-serif",
  나눔고딕:   "'Nanum Gothic', sans-serif",
  검은고딕:   "'Black Han Sans', 'Pretendard', sans-serif",
};
const BG = {
  흰색:   { paper:'#FFFFFF', dark:false },
  종이:   { paper:'#F6F4EF', dark:false },
  어둡게: { paper:'#1C1A18', dark:true  },
};

/* "11AM" "9am" "1:30PM" → 분(정렬용). 못 읽으면 큰 수(맨 끝). */
function timeToMinutes(t) {
  const m = String(t).trim().toLowerCase().match(/(\d{1,2})(?::(\d{2}))?\s*([ap])\.?m\b/);
  if (!m) return 99999;
  let h = (+m[1]) % 12;
  if (m[3] === 'p') h += 12;
  return h * 60 + (+(m[2] || 0));
}
/* 표시용 시간. mode '24시'면 HH:MM, 아니면 원문 그대로. */
function formatTime(t, mode) {
  if (mode !== '24시') return String(t);
  const mm = timeToMinutes(t);
  if (mm >= 99999) return String(t);
  return `${String(Math.floor(mm / 60)).padStart(2, '0')}:${String(mm % 60).padStart(2, '0')}`;
}

/* URL이 실제로 링크 걸 만한가? 빈값·플레이스홀더(…, CHANNEL_ID)면 false → 일반 셀. */
function isUsableUrl(u) {
  const s = String(u || '').trim();
  if (!s) return false;
  if (s.includes('…') || s.includes('...') || /CHANNEL_ID/i.test(s)) return false;
  return true;
}
function href(u) {
  let s = String(u).trim();
  if (!/^https?:\/\//i.test(s)) s = 'https://' + s;
  return escapeAttr(s);
}

/* HTML 이스케이프 — 제목에 <,>,& 들어가도 안 깨지게. (현재 생성기엔 없던 구멍) */
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g, '&quot;');
}

/* ── 본체 ───────────────────────────────────────────────────────────────
   인자:
     members  : [{ id, name, bg, fg, url }]
     schedule : [{ day, time, mem, title, url }]   // mem = members[].id
     dates    : { 월:'06.15', ... }
     theme    : 아래 기본값 참고 (survive 포함)
   반환: 네이버 대문에 붙여넣을 HTML 문자열 한 덩어리. */
function generateScheduleHTML({ members = [], schedule = [], dates = {}, theme = {} } = {}) {
  const t = {
    font:'Pretendard', fontSize:'보통', align:'왼쪽', wrap:'자동',
    collision:'좌우', radius:16, bg:'흰색', timeFmt:'AM/PM',
    header:'', subtitle:'', logo:'', linkUnderline:true, fontScale:1,
    survive: DEFAULT_SURVIVE,
    ...theme,
  };
  const S = { ...DEFAULT_SURVIVE, ...(t.survive || {}) };
  const M = Object.fromEntries(members.map(m => [m.id, m]));
  // 카드 비율(패딩·모서리)은 고정하고 "글씨"만 배율로 조정한다.
  // fontScale은 텍스트 크기에만 곱하고 썸네일·패딩은 건드리지 않는다 → 카드 비율 유지.
  const base = SIZE[t.fontSize] || SIZE.보통;
  const sc = Math.max(0.6, Math.min(1.6, +t.fontScale || 1));
  const SZ = {};
  for (const k in base) SZ[k] = k === 'thumb' ? base[k] : Math.round(base[k] * sc * 10) / 10;
  const fontStack = FONT[t.font] || FONT.Pretendard;
  const bg = BG[t.bg] || BG.흰색;
  const dark = bg.dark;
  const align = t.align === '가운데' ? 'center' : 'left';
  const radius = S.borderRadius ? (+t.radius || 0) : 0;

  const headInk  = dark ? '#ECE8E1' : '#2A2724';
  const dowBg    = dark ? 'rgba(255,255,255,0.12)' : '#ECEAE6';
  const dowFg    = dark ? 'rgba(255,255,255,0.7)'  : '#7C766C';
  const headLine = dark ? '#5A554E' : '#D9D4CB';
  const pillBg   = dark ? '#F3F0EA' : '#FFFFFF';
  const shadow   = S.boxShadow ? 'box-shadow:0 2px 5px rgba(0,0,0,.12);' : '';

  const titleWrap = t.wrap === '말줄임'
    ? 'white-space:nowrap;overflow:hidden;text-overflow:ellipsis'
    : 'overflow-wrap:break-word;word-break:keep-all;line-height:1.3';

  const TIMES = [...new Set(schedule.map(s => s.time))].sort((a, b) => timeToMinutes(a) - timeToMinutes(b));

  /* 요일 헤더 */
  let head = '';
  for (const day of DAYS) {
    const tone = DAY_TONE[day] || headInk;
    head +=
      `      <td style="padding:0 4px 12px;text-align:center;vertical-align:top">` +
      `<span style="display:inline-block;background:${dowBg};color:${dowFg};` +
      (radius ? `border-radius:13px;` : '') +
      `padding:3px 11px;font-size:${SZ.dow}px;font-weight:600">${DOW[day]}</span>` +
      `<div style="font-size:${SZ.date}px;font-weight:800;color:${tone};margin-top:7px;letter-spacing:-0.5px">` +
      `${escapeHtml(dates[day] || '')}</div></td>\n`;
  }

  /* 카드 1장.
     스파이크 1차: 카드는 <div>(배경/모서리/그림자 보존). 클릭 링크는 카드 안의
     이름+제목 텍스트를 감싼 inline <a>(블록 <a> 카드는 네이버가 제거하므로). */
  const card = (c, narrow) => {
    const m = M[c.mem];
    if (!m) return '';
    const cardBg = S.bgColor ? m.bg : '#FFFFFF';
    const linkable = S.linkText && isUsableUrl(c.url || m.url);
    const url = c.url || m.url;
    // data: 이미지는 네이버가 제거(⑥) → 외부 http(s) URL만 허용.
    const img = (S.inlineImg && m.img && /^https?:\/\//i.test(m.img)) ? m.img : null;

    const pill =
      `<span style="display:inline-block;background:${pillBg};color:#2A2724;` +
      (radius ? `border-radius:9px;` : '') +
      `padding:2px 8px;font-size:${SZ.pill}px;font-weight:800;white-space:nowrap">` +
      `${escapeHtml(formatTime(c.time, t.timeFmt))}</span>`;

    // 이름 + 제목 텍스트 묶음을 하나의 inline <a>로 감싼다(<br>로 줄바꿈 — 블록 자식 없음).
    // 이름은 nowrap — 좁은 칸에서도 "여우연"이 글자별로 세로로 쪼개지지 않게(알약처럼 네이버 보존).
    const nameHtml = `<b style="font-size:${SZ.name}px;color:${m.fg};white-space:nowrap">${escapeHtml(m.name)}</b>`;
    const titleHtml = c.title
      ? `<br><span style="font-size:${SZ.title}px;color:${m.fg}">${escapeHtml(c.title)}</span>`
      : '';
    const textInner = nameHtml + titleHtml;
    // 카드 위 inline 링크는 모바일에서 hover가 없어 "누를 수 있음"이 안 보인다.
    // 밑줄(2차 E에서 보존 확인)로 클릭 가능 신호를 준다 — linkUnderline로 끌 수 있음.
    const deco = t.linkUnderline ? 'underline' : 'none';
    const linkedText = linkable
      ? `<a href="${href(url)}" class="schd-link" style="text-decoration:${deco};color:${m.fg};word-break:keep-all">${textInner}</a>`
      : textInner;

    // 시간 알약(+썸네일)은 윗줄 오른쪽에 따로 둔다 → 이름/제목이 칸 전체 폭을 쓴다
    // (좁은 7열 격자에서 이름이 알약과 폭을 나눠 쓰다 글자별로 깨지는 걸 막음).
    const ts = SZ.thumb;
    const topRight =
      `<div style="text-align:right;line-height:1">${pill}` +
      (img ? `<br><img src="${escapeAttr(img)}" alt="" style="width:${ts}px;height:${ts}px;object-fit:cover;${radius ? 'border-radius:9px;' : ''}display:inline-block;margin-top:6px">` : '') +
      `</div>`;
    let body;
    if (narrow) {
      body = `<div style="text-align:${align}">${linkedText}</div>` +
             `<div style="margin-top:7px;text-align:${align}">${pill}</div>`;
    } else {
      body = topRight + `<div style="margin-top:4px;text-align:${align};word-break:keep-all">${linkedText}</div>`;
    }

    const style =
      `background:${cardBg};` +
      (radius ? `border-radius:${radius}px;` : '') +
      `padding:10px 12px;${shadow}box-sizing:border-box;word-break:keep-all;` +
      (narrow ? `display:inline-block;width:49%;vertical-align:top;` : `display:block;`);

    return `<div class="schd-card" style="${style}">${body}</div>`;
  };

  /* 시간 행 */
  let rows = '';
  for (const time of TIMES) {
    rows += `    <tr>\n`;
    for (const day of DAYS) {
      const es = schedule
        .filter(s => s.day === day && s.time === time)
        .sort((a, b) => members.findIndex(m => m.id === a.mem) - members.findIndex(m => m.id === b.mem));
      if (!es.length) { rows += `      <td></td>\n`; continue; }
      let inner;
      if (es.length > 1 && t.collision === '좌우') {
        inner = es.map((c, i) =>
          (i ? '<span style="display:inline-block;width:2%"></span>' : '') + card(c, true)).join('');
      } else {
        inner = es.map((c, i) => `<div style="${i ? 'margin-top:6px' : ''}">${card(c)}</div>`).join('');
      }
      rows += `      <td style="padding:5px 6px;vertical-align:top">${inner}</td>\n`;
    }
    rows += `    </tr>\n`;
  }

  /* 상단 헤더(제목 + 배지) */
  let topHeader = '';
  if (t.header || t.subtitle) {
    const emS = SZ.big + 14;
    const emblem = (S.inlineImg && t.logo && /^https?:\/\//i.test(t.logo))
      ? `<img src="${escapeAttr(t.logo)}" alt="" style="width:${emS}px;height:${emS}px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:10px">`
      : '';
    const titleTxt = t.header
      ? `${emblem}<b style="font-size:${SZ.big}px;color:${headInk};vertical-align:middle">${escapeHtml(t.header)}</b>`
      : '';
    const badge = t.subtitle
      ? `<span style="display:inline-block;background:#FF5A5A;color:#fff;${radius ? 'border-radius:18px;' : ''}padding:6px 14px;font-size:${SZ.dow + 1}px;font-weight:700">📢 ${escapeHtml(t.subtitle)}</span>`
      : '';
    topHeader =
      `  <table cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;margin-bottom:10px"><tr>` +
      `<td style="padding:0;text-align:left;vertical-align:middle">${titleTxt}</td>` +
      `<td style="padding:0;text-align:right;vertical-align:middle">${badge}</td></tr></table>\n` +
      `  <div style="border-bottom:2px solid ${headLine};margin-bottom:14px"></div>\n`;
  }

  const table =
    `  <table cellpadding="0" cellspacing="0" style="border-collapse:collapse;width:100%;table-layout:fixed">\n` +
    `    <tbody>\n    <tr>\n${head}    </tr>\n${rows}    </tbody>\n  </table>`;

  return `<div style="font-family:${fontStack};background:${bg.paper};color:${headInk};padding:16px 14px;max-width:740px">\n${topHeader}${table}\n</div>`;
}

/* ───── src/sheet.js (인라인, 구글시트 연동) ───── */
/* sheet.js — 구글시트 연동 (브라우저 전용, gviz JSONP → file://에서도 동작).

   왜 이렇게 바뀌었나: 옛 버전은 SHEET_ID + GID 8개를 하드코딩 → 시트에 새 주차 탭이
   새 gid로 생기면 안 잡혔다("매주 시트만 고치면" 약속이 깨지는 지점).
   이제는 "그 주 탭의 URL(또는 gid)을 붙여넣기" 한 줄 → 어떤 탭이든(새 탭 포함) 불러온다.
   멤버 이름→id 매핑도 하드코딩 대신 현재 members에서 만든다. */

const DEFAULT_SHEET_ID = '1BsAtW0sfSRjyJOQAe3mgVzYuRLa6rUasWOfPca1kEQw';
/* 알려진 주차 탭(gid). 새 주가 생기면 UI에서 URL 붙여 추가(append)한다. */
const DEFAULT_SHEET_TABS = [
  { gid: '1915098412', label: '03.30–04.05' },
  { gid: '101804373',  label: '04.06–04.12' },
  { gid: '157305670',  label: '05.04–05.10' },
  { gid: '1732047555', label: '06.01–06.07' },
  { gid: '1450063042', label: '06.08–06.14' },
  { gid: '765296139',  label: '06.15–06.21' },
  { gid: '1416966752', label: '06.22–06.28' },
  { gid: '1762834858', label: '06.29–07.05' },
];
const DAYK = ['월', '화', '수', '목', '금', '토', '일'];
const OFFSET = new Set(['', 'x', 'X', '휴방', '-', '휴뱅', '휴 방', '?', '???']);

/* 입력에서 sheetId·gid 추출. 전체 URL / "#gid=123" / 순수 숫자 gid 모두 허용. */
function parseSheetRef(input, defaultId = DEFAULT_SHEET_ID) {
  const s = String(input || '').trim();
  let sheetId = defaultId, gid = '0';
  const idm = s.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if (idm) sheetId = idm[1];
  const gm = s.match(/[#&?]gid=(\d+)/) || s.match(/^(\d+)$/);
  if (gm) gid = gm[1];
  return { sheetId, gid };
}

function gvizFetch(sheetId, gid) {
  return new Promise((resolve, reject) => {
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    const s = document.createElement('script');
    let done = false;
    const fin = (fn, a) => { if (done) return; done = true; try { s.remove(); } catch {} fn(a); };
    window.google.visualization.Query.setResponse = resp => fin(resolve, resp);
    s.onerror = () => fin(reject, new Error('시트를 불러오지 못함 — 공유가 "링크 있는 사람 보기"인지 확인'));
    s.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?gid=${gid}&tqx=out:json&headers=0`;
    document.head.appendChild(s);
    setTimeout(() => fin(reject, new Error('시트 응답 시간 초과')), 15000);
  });
}

function gridFromResp(resp) {
  const rows = (resp.table && resp.table.rows) || [];
  return rows.map(r => (r.c || []).map(c => c == null ? '' : (c.f != null ? String(c.f) : (c.v != null ? String(c.v) : ''))));
}

/* "11AM" "9am" "1:30PM" → "11AM"/"9AM"/"1:30PM" 정규화(생성기 timeToMinutes와 호환). */
function normTime(t) {
  const m = String(t).trim().toLowerCase().match(/(\d{1,2})(?::(\d{2}))?\s*([ap])\.?m/);
  if (!m) return String(t).trim();
  const ap = m[3].toUpperCase() + 'M';
  return m[2] ? `${m[1]}:${m[2]}${ap}` : `${m[1]}${ap}`;
}

/* 시트 그리드 → {entries, weekStart}. 레이아웃: 멤버명 칸(요일 헤더 왼쪽 열) +
   멤버마다 2행(시간 행 / 제목 행), 열 = 월~일. (사용자 시트 구조) */
function parseWeekGrid(grid, members) {
  const name2id = {};
  for (const m of members) name2id[m.name] = m.id;

  let hi = -1, dstart = -1;
  for (let i = 0; i < grid.length; i++) {
    const j = grid[i].indexOf('월');
    if (j >= 0) { hi = i; dstart = j; break; }
  }
  if (hi < 0) return null;
  const mcol = dstart - 1;

  let label = '';
  for (let i = 0; i < hi && !label; i++)
    for (const c of grid[i]) if (c && /\d.*[~\-]/.test(c)) { label = c.trim(); break; }

  const entries = []; let id = 0;
  for (let i = hi + 1; i < grid.length;) {
    const name = (grid[i][mcol] || '').trim();
    if (name2id[name]) {
      const tr = grid[i + 1] || [];
      for (let di = 0; di < 7; di++) {
        const ci = dstart + di;
        const t = (grid[i][ci] || '').trim();
        const title = (tr[ci] || '').trim();
        if (OFFSET.has(t) || title === '휴방') continue;
        entries.push({ id: 's' + id++, day: DAYK[di], time: normTime(t), mem: name2id[name], title: title.replace(/\s*\n\s*/g, ' ').trim(), url: '' });
      }
      i += 2;
    } else i++;
  }
  const m = label.match(/(\d{2})(\d{2})/);
  const weekStart = m ? `${m[1]}.${m[2]}` : '';
  return { entries, weekStart, label };
}

/* 한 탭 불러오기 → {schedule, weekStart, label, gid}. 실패 시 throw. */
async function loadWeekFromSheet(input, members, defaultId = DEFAULT_SHEET_ID) {
  const { sheetId, gid } = parseSheetRef(input, defaultId);
  const resp = await gvizFetch(sheetId, gid);
  if (!resp || resp.status !== 'ok') throw new Error('시트 응답 오류 (gid가 맞는지 확인)');
  const w = parseWeekGrid(gridFromResp(resp), members);
  if (!w || !w.entries.length) throw new Error('이 탭에서 스케줄을 못 찾았어요 (멤버 이름·요일 행 확인)');
  return { schedule: w.entries, weekStart: w.weekStart, label: w.label || '', gid };
}

/* 여러 탭을 순서대로 불러와 주(week) 배열로. 실패한 탭은 건너뛴다.
   onProgress(done, total)로 진행상황 알림(선택). */
async function loadTabsFromSheet(sheetId, tabs, members, onProgress) {
  const weeks = [];
  for (let i = 0; i < tabs.length; i++) {
    const tab = tabs[i];
    try {
      const resp = await gvizFetch(sheetId, tab.gid);
      if (resp && resp.status === 'ok') {
        const w = parseWeekGrid(gridFromResp(resp), members);
        if (w && w.entries.length) {
          weeks.push({
            gid: String(tab.gid),
            label: w.label || tab.label || tab.gid,
            weekStart: w.weekStart || '',
            schedule: w.entries,
          });
        }
      }
    } catch { /* 한 탭 실패는 건너뜀 */ }
    if (onProgress) onProgress(i + 1, tabs.length);
  }
  // weekStart(MM.DD) 기준 정렬
  weeks.sort((a, b) => String(a.weekStart).localeCompare(String(b.weekStart)));
  return weeks;
}

/* ── 작은 DOM 헬퍼 ── */
function el(tag, props = {}, kids = []) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'style') n.style.cssText = v;
    else if (k === 'class') n.className = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (k === 'html') n.innerHTML = v;
    else if (v != null && v !== false) n.setAttribute(k, v);
  }
  for (const c of [].concat(kids)) if (c != null && c !== false) n.append(c.nodeType ? c : document.createTextNode(c));
  return n;
}
const $ = sel => document.querySelector(sel);

/* "MM.DD" 월요일 → 요일별 날짜 맵 */
function computeDates(weekStart) {
  const out = {};
  const m = String(weekStart || '').match(/(\d{1,2})[.\-/](\d{1,2})/);
  if (!m) { for (const d of DAYS) out[d] = ''; return out; }
  let mo = +m[1], da = +m[2];
  for (const d of DAYS) {
    out[d] = `${String(mo).padStart(2, '0')}.${String(da).padStart(2, '0')}`;
    da++; if (da > MDAYS[mo - 1]) { da = 1; mo = mo % 12 + 1; }
  }
  return out;
}

  wrap.append(panelHead('스케줄 · ' + (w.label || ''), '시트 탭별로 주를 넘기며 편집해요. 한 줄 = 방송 하나, 바로 고치면 오른쪽 미리보기에 즉시 반영돼요.'));
  wrap.append(sheetBar());
  wrap.append(weekTabs());

  const top = el('div', { style: 'display:flex;align-items:center;gap:10px;margin-bottom:12px' }, [
    el('span', { style: 'font-size:12.5px;color:var(--sub);font-weight:600' }, '이번 주 월요일'),
    el('input', { value: w.weekStart, style: inp + ';width:80px', placeholder: '06.15',
      oninput: e => { w.weekStart = e.target.value; refreshPreview(); } }),
    el('div', { style: 'flex:1' }),
    el('button', { style: btnPrimary, onclick: () => addRow() }, '＋ 방송 추가'),
  ]);
  wrap.append(top);

  const sorted = [...w.schedule].sort((a, b) =>
    (DAYS.indexOf(a.day) - DAYS.indexOf(b.day)) || (timeToMinutes(a.time) - timeToMinutes(b.time)));

  const list = el('div', { style: 'display:flex;flex-direction:column;gap:6px' });
  for (const e of sorted) list.append(scheduleRow(e));
  if (!sorted.length) list.append(el('div', { style: 'padding:30px;text-align:center;color:var(--sub);font-size:13px' }, '이 주엔 방송이 없어요. ＋ 방송 추가 또는 시트에서 불러오기.'));
  wrap.append(list);
  return wrap;
}
function scheduleRow(e) {
  const m = S.members.find(x => x.id === e.mem) || S.members[0];
  const row = el('div', { style: `display:flex;align-items:center;gap:6px;padding:7px 9px;background:#fff;border:1px solid var(--hair);border-radius:10px` });
  // 멤버 색 점
  const dot = el('span', { style: `width:14px;height:14px;border-radius:4px;flex-shrink:0;background:${m ? m.bg : '#ccc'}` });
  // 요일
  const daySel = el('select', { style: inp + ';width:52px', onchange: ev => { e.day = ev.target.value; refreshPreview(); } },
    DAYS.map(d => el('option', { value: d, selected: d === e.day || false }, d)));
  daySel.value = e.day;
  // 시간
  const timeIn = el('input', { value: e.time, style: inp + ';width:62px', placeholder: '9AM',
    oninput: ev => { e.time = ev.target.value; refreshPreview(); } });
  // 멤버
  const memSel = el('select', { style: inp + ';width:84px', onchange: ev => { e.mem = ev.target.value; dot.style.background = (S.members.find(x => x.id === ev.target.value) || {}).bg || '#ccc'; refreshPreview(); } },
    S.members.map(mm => el('option', { value: mm.id }, mm.name)));
  memSel.value = e.mem;
  // 제목
  const titleIn = el('input', { value: e.title, style: inp + ';flex:1;min-width:0', placeholder: '방송 제목',
    oninput: ev => { e.title = ev.target.value; refreshPreview(); } });
  // URL
  const urlIn = el('input', { value: e.url, class: 'mono', style: inp + ';flex:1;min-width:0;font-size:12px',
    placeholder: `비우면 ${m ? m.name : ''} 기본 URL`,
    oninput: ev => { e.url = ev.target.value; refreshPreview(); } });
  // 삭제
  const del = el('button', { style: btn + ';color:#C0392B;border-color:rgba(192,57,43,.35);padding:7px 10px', title: '삭제',
    onclick: () => { setCurSched(curSched().filter(x => x.id !== e.id)); render(); } }, '✕');
  row.append(dot, daySel, timeIn, memSel, titleIn, urlIn, del);
  return row;
}
function addRow() {
  curSched().push({ id: 'n' + (_newId++), day: '월', time: '12PM', mem: S.members[0].id, title: '', url: '' });
  render();
}

/* ── 멤버 패널 ── */
function membersPanel() {
  const wrap = el('div', { style: 'flex:1;overflow-y:auto;padding:18px 22px' });
  wrap.append(panelHead('멤버', '배경색·글자색·기본 URL. 거의 안 바뀌어요. 스케줄 칸의 URL이 비면 여기 기본 URL로 연결돼요.'));
  const list = el('div', { style: 'display:flex;flex-direction:column;gap:8px' });
  for (const m of S.members) {
    const preview = el('span', { style: `display:inline-flex;align-items:center;justify-content:center;width:54px;height:34px;border-radius:8px;flex-shrink:0;font-size:12px;font-weight:800;background:${m.bg};color:${m.fg}` }, m.name);
    const bgIn = el('input', { type: 'color', value: toHex(m.bg), title: '배경색', style: 'width:34px;height:30px;border:1px solid var(--hair);border-radius:7px;padding:1px;cursor:pointer;background:#fff',
      oninput: ev => { m.bg = ev.target.value; preview.style.background = ev.target.value; refreshPreview(); } });
    const fgIn = el('input', { type: 'color', value: toHex(m.fg), title: '글자색', style: 'width:34px;height:30px;border:1px solid var(--hair);border-radius:7px;padding:1px;cursor:pointer;background:#fff',
      oninput: ev => { m.fg = ev.target.value; preview.style.color = ev.target.value; refreshPreview(); } });
    const urlIn = el('input', { value: m.url, class: 'mono', style: inp + ';flex:1;min-width:0;font-size:12px', placeholder: 'chzzk.naver.com/...',
      oninput: ev => { m.url = ev.target.value; refreshPreview(); } });
    list.append(el('div', { style: 'display:flex;align-items:center;gap:8px;padding:9px 11px;background:#fff;border:1px solid var(--hair);border-radius:11px' }, [
      preview,
      el('span', { style: 'width:48px;font-size:13.5px;font-weight:700;flex-shrink:0' }, m.name),
      el('span', { style: 'font-size:11px;color:var(--sub)' }, '배경'), bgIn,
      el('span', { style: 'font-size:11px;color:var(--sub)' }, '글자'), fgIn,
      urlIn,
    ]));
  }
  wrap.append(list);
  wrap.append(note('설정은 이 브라우저에 저장돼요(새로고침해도 유지). data: 이미지는 네이버가 지우므로 썸네일은 외부 URL만 지원해요.'));
  return wrap;
}
function toHex(c) {
  if (typeof c !== 'string') return '#000000';
  if (/^#[0-9a-fA-F]{6}$/.test(c)) return c;
  if (/^#[0-9a-fA-F]{3}$/.test(c)) return '#' + c.slice(1).split('').map(x => x + x).join('');
  return '#888888';
}

/* ── 디자인 패널 ── */

  wrap.append(panelHead('디자인', '바꾸면 오른쪽 미리보기 = 붙여넣을 결과 그대로. 스파이크로 검증된, 네이버에서 살아남는 스타일만 있어요.'));
  const set = (k, v) => { S.theme[k] = v; render(); };
  const rows = [
    ['헤더 텍스트', el('input', { value: S.theme.header, style: inp + ';flex:1', placeholder: '비우면 제목 없음', oninput: e => { S.theme.header = e.target.value; refreshPreview(); } })],
    ['서브 배지', el('input', { value: S.theme.subtitle, style: inp + ';flex:1', placeholder: '비우면 배지 없음', oninput: e => { S.theme.subtitle = e.target.value; refreshPreview(); } })],
    ['글자 크기', seg(S.theme.fontSize, ['작게', '보통', '크게'].map(v => ({ v, label: v })), v => set('fontSize', v))],
    ['글자 배율', fontScaleSlider()],
    ['배경', seg(S.theme.bg, ['흰색', '종이', '어둡게'].map(v => ({ v, label: v })), v => set('bg', v))],
    ['링크 밑줄', seg(S.theme.linkUnderline, [{ v: true, label: '밑줄로 표시' }, { v: false, label: '없음' }], v => set('linkUnderline', v))],
    ['겹칠 때', seg(S.theme.collision, [{ v: '좌우', label: '좌·우' }, { v: '위아래', label: '위·아래' }], v => set('collision', v))],
    ['정렬', seg(S.theme.align, ['왼쪽', '가운데'].map(v => ({ v, label: v })), v => set('align', v))],
    ['줄바꿈', seg(S.theme.wrap, [{ v: '자동', label: '자동' }, { v: '말줄임', label: '한 줄(…)' }], v => set('wrap', v))],
    ['모서리', seg(S.theme.radius, [{ v: 8, label: '각지게' }, { v: 16, label: '기본' }, { v: 24, label: '둥글게' }], v => set('radius', v))],
    ['시간 표기', seg(S.theme.timeFmt, ['AM/PM', '24시'].map(v => ({ v, label: v })), v => set('timeFmt', v))],
    ['폰트', seg(S.theme.font, ['Pretendard', '나눔고딕', '검은고딕'].map(v => ({ v, label: v })), v => set('font', v))],
  ];
  const box = el('div', { style: 'display:flex;flex-direction:column;gap:8px' });
  for (const [label, ctrl] of rows) {
    box.append(el('div', { style: 'display:flex;align-items:center;gap:14px;padding:11px 13px;background:#fff;border:1px solid var(--hair);border-radius:11px' }, [
      el('div', { style: 'width:84px;font-size:13px;font-weight:700;flex-shrink:0' }, label), ctrl,
    ]));
  }
  wrap.append(box);
  return wrap;
}

/* 글자 배율 슬라이더 — 카드 패딩·비율은 고정, 텍스트 크기만 60~160%로 조정.
   드래그 중엔 미리보기만 갱신(패널 재구성 없이). */
function fontScaleSlider() {
  const pct = el('span', { style: 'font-size:12.5px;font-weight:700;color:var(--accent);width:46px;text-align:right' }, Math.round((S.theme.fontScale || 1) * 100) + '%');
  const range = el('input', {
    type: 'range', min: '60', max: '160', step: '5', value: String(Math.round((S.theme.fontScale || 1) * 100)),
    style: 'flex:1;accent-color:var(--accent);cursor:pointer',
    oninput: e => { S.theme.fontScale = (+e.target.value) / 100; pct.textContent = e.target.value + '%'; refreshPreview(); },
  });
  const reset = el('button', { style: btn + ';padding:5px 9px;font-size:11px', title: '100%로', onclick: () => { S.theme.fontScale = 1; render(); } }, '↺');
  return el('div', { style: 'display:flex;align-items:center;gap:10px;flex:1' }, [range, pct, reset]);
}

/* ── 미리보기(우측) ── */
function previewPane() {

      el('div', { style: 'font-size:13px;font-weight:700' }, ['대문 미리보기 ', el('span', { style: 'font-size:11px;font-weight:500;color:var(--sub)' }, '= 붙여넣을 결과')]),
      el('span', { id: 'pv-count', style: 'font-size:10.5px;font-weight:700;color:var(--accent);background:rgba(192,67,42,.1);padding:3px 9px;border-radius:20px' }, `링크 ${links} · 방송 ${curSched().length}`),
    ]),

      el('div', { style: 'border-radius:10px;box-shadow:0 2px 14px rgba(0,0,0,.08);overflow:hidden;border:1px solid var(--hair);width:454px' }, [

      ]),
      el('div', { style: 'text-align:center;font-size:11px;color:var(--sub);margin-top:10px' }, '740px 기준. 텍스트 링크 = 클릭. 위 모습 그대로 대문에 떠요.'),
    ]),
    el('div', { style: 'flex-shrink:0;border-top:1px solid var(--hair);background:#211F1C;max-height:200px;overflow:auto' }, [codeEl]),
  ]);

/* ── 공통 조각 ── */
function panelHead(title, sub) {
  return el('div', { style: 'margin-bottom:14px' }, [
    el('div', { style: 'font-size:18px;font-weight:800' }, title),
    el('div', { style: 'font-size:12.5px;color:var(--sub);margin-top:3px' }, sub),
  ]);
}
function note(text) {
  return el('div', { style: 'margin-top:14px;display:flex;gap:8px;padding:11px 13px;background:rgba(192,67,42,.06);border:1px solid rgba(192,67,42,.18);border-radius:10px;font-size:12.5px;color:#6E3A2C;line-height:1.5' }, [
    el('span', { style: 'color:var(--accent);font-weight:800' }, '▸'), el('div', {}, text),
  ]);
}

/* ── 액션 ── */
function onCopy() {
  const html = genHTML();
  const done = () => { const b = $('#copyBtn'); if (b) { b.textContent = '복사됨 ✓'; b.style.background = '#2E7D5B'; setTimeout(() => { b.textContent = 'HTML 복사'; b.style.background = C.accent; }, 1500); } };
  if (navigator.clipboard) navigator.clipboard.writeText(html).then(done).catch(() => { fallbackCopy(html); done(); });
  else { fallbackCopy(html); done(); }
}
function fallbackCopy(text) {
  const ta = el('textarea', { style: 'position:fixed;opacity:0' }); ta.value = text;
  document.body.append(ta); ta.select(); try { document.execCommand('copy'); } catch {} ta.remove();
}
function exportCSV() {
  const w = curWeek();
  const dates = computeDates(w.weekStart);
  const rows = w.schedule.map(e => ({ 요일: e.day, 날짜: dates[e.day] || '', 시간: e.time, 멤버: e.mem, 제목: e.title, URL: e.url }));
  const csv = toCSV(rows, ['요일', '날짜', '시간', '멤버', '제목', 'URL']);
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a = el('a', { href: URL.createObjectURL(blob), download: `schedule-${w.weekStart || 'week'}.csv` });
  document.body.append(a); a.click(); a.remove();
}
/* 시트의 모든(알려진) 탭을 불러와 주 목록으로 분류. */
async function loadAllTabs(btn) {
  if (!confirm('시트의 탭들을 불러와 주(week) 목록을 새로 채워요. 현재 편집을 덮어쓸 수 있어요. 계속할까요?')) return;
  const orig = btn.textContent; btn.disabled = true;
  try {
    const weeks = await loadTabsFromSheet(S.sheetId || DEFAULT_SHEET_ID, S.sheetTabs, S.members, (d, t) => { btn.textContent = `불러오는 중… ${d}/${t}`; });
    if (!weeks.length) { alert('불러온 탭이 없어요. 시트 공유("링크 있는 사람 보기")·ID·gid를 확인해줘요.'); btn.textContent = orig; btn.disabled = false; return; }
    S.weeks = weeks.map(w => ({ ...w, schedule: w.schedule.map((e, i) => ({ ...e, id: 'sh' + i })) }));
    S.weekIdx = S.weeks.length - 1; S.selId = null; save(); render();
  } catch (e) { alert('불러오기 실패: ' + e.message); btn.textContent = orig; btn.disabled = false; }
}
/* 새 주차 탭 하나를 URL/gid로 추가(append). */
async function appendTab(input, btn) {
  const ref = (input.value || '').trim();
  if (!ref) return alert('탭 URL 또는 gid를 넣어줘요.');
  const orig = btn.textContent; btn.disabled = true; btn.textContent = '…';
  try {
    const w = await loadWeekFromSheet(ref, S.members, S.sheetId || DEFAULT_SHEET_ID);
    const wk = { gid: w.gid, label: w.label || w.weekStart || w.gid, weekStart: w.weekStart, schedule: w.schedule.map((e, i) => ({ ...e, id: 'sh' + i })) };
    const idx = S.weeks.findIndex(x => x.gid && String(x.gid) === String(w.gid));
    if (idx >= 0) S.weeks[idx] = wk; else S.weeks.push(wk);
    if (!S.sheetTabs.find(t => String(t.gid) === String(w.gid))) S.sheetTabs.push({ gid: w.gid, label: wk.label });
    S.weekIdx = idx >= 0 ? idx : S.weeks.length - 1; S.selId = null; save(); render();
  } catch (e) { alert('탭 추가 실패: ' + e.message); btn.disabled = false; btn.textContent = orig; }
}
function importCSV() {
  const f = el('input', { type: 'file', accept: '.csv' });
  f.onchange = () => {
    const file = f.files && f.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const rows = parseCSVObjects(String(r.result));
        if (!rows.length) return alert('빈 CSV예요.');
        const schedule = rows.map((row, i) => ({ id: 'i' + i, day: row.요일, time: row.시간, mem: row.멤버, title: row.제목, url: row.URL || '' }));
        const ws = (rows.find(x => x.요일 === '월' && x.날짜) || {}).날짜 || '';
        // CSV는 현재 주에 들어온다(현재 주가 비어있지 않으면 새 주로 추가).
        if (curSched().length && !confirm('현재 주에 덮어쓸까요? 취소하면 새 주로 추가해요.')) {
          S.weeks.push({ label: (ws || 'CSV') + ' 주', weekStart: ws, schedule, gid: null });
          S.weekIdx = S.weeks.length - 1;
        } else {
          curWeek().schedule = schedule;
          if (ws) curWeek().weekStart = ws;
        }
        S.selId = null; render();
      } catch (e) { alert('CSV를 읽지 못했어요: ' + e.message); }
    };
    r.readAsText(file);
  };
  f.click();
}

/* ── 루트 렌더 ── */
function render() {
  const app = $('#app');
  app.innerHTML = '';
  const panel = S.section === 'members' ? membersPanel() : S.section === 'design' ? designPanel() : schedulePanel();
  const win = el('div', { style: 'height:100vh;display:flex;flex-direction:column;background:var(--paper)' }, [
    header(),
    el('div', { style: 'flex:1;display:flex;min-height:0' }, [
      leftNav(),
      el('div', { style: 'flex:1;min-width:0;display:flex;flex-direction:column' }, panel),
      previewPane(),
    ]),
  ]);
  app.append(win);
  save();
}
render();
